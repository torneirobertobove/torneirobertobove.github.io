<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iscrizione Torneo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{
    background:#0f172a;
    color:white;
    font-family:system-ui, sans-serif;
    padding:20px;
}


.card{

    background:#111827;
    border:1px solid #243041;
    border-radius:12px;
    padding:20px;
    max-width:500px;
    margin:auto;

}


h2{

    text-align:center;
    color:#10b981;

}


.info{

    background:#0b1220;
    padding:12px;
    border-radius:8px;
    margin:10px 0;

}


button{

    width:100%;
    padding:12px;
    margin-top:12px;
    border:0;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    font-size:16px;

}


button:hover{

    background:#1d4ed8;

}


.back{

    background:#475569;

}


.successo{

    color:#22c55e;
    text-align:center;
    font-weight:bold;

}


.errore{

    color:#ef4444;
    text-align:center;
    font-weight:bold;

}


</style>


</head>


<body>


<div class="card">


<h2>
🏆 Iscrizione torneo
</h2>



<div id="datiTorneo">
Caricamento...
</div>



<div id="datiUtente">
</div>




<button onclick="confermaIscrizione()">

Conferma iscrizione

</button>




<button class="back" onclick="tornaTornei()">

Torna ai tornei

</button>




<div id="messaggio">

</div>


</div>



<script>


const sb = supabase.createClient(

"https://iybjvtmfaupgthqqsngd.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI"

);



const torneoId = new URLSearchParams(

window.location.search

).get("torneo");



let torneo=null;

let utente=null;

let profilo=null;

async function inizializza(){


    if(!torneoId){

        mostraMessaggio(
            "❌ Torneo non selezionato",
            "errore"
        );

        return;
    }



    const {

        data:{
            user

        }

    } = await sb.auth.getUser();



    if(!user){

        window.location.href="index.html";

        return;

    }



    utente=user;



    const {

        data:torneoLetto,

        error:erroreTorneo

    } = await sb

    .from("tornei")

    .select(
        "id,nome,data,configurazione,posti,stato"
    )

    .eq(
        "id",
        torneoId
    )

    .single();




    if(erroreTorneo || !torneoLetto){


        console.error(
            erroreTorneo
        );


        mostraMessaggio(
            "❌ Errore caricamento torneo",
            "errore"
        );


        return;

    }



    torneo=torneoLetto;




    const {

        data:profiloLetto,

        error:erroreProfilo

    } = await sb

    .from("profili")

    .select(
        "nome,cognome,email,telefono,livello,note"
    )

    .eq(
        "user_id",
        user.id
    )

    .single();





    if(erroreProfilo){

        console.warn(
            "Profilo non trovato",
            erroreProfilo
        );

    }



    profilo=profiloLetto || null;



    mostraDati();



}




function getNumeroSquadre(){


    let squadre=0;



    if(
        torneo &&
        torneo.configurazione &&
        torneo.configurazione.rules &&
        torneo.configurazione.rules.numeroSquadre
    ){

        squadre=Number(
            torneo.configurazione.rules.numeroSquadre
        );


    }
    else if(torneo && torneo.posti){

        squadre=Number(
            torneo.posti
        );

    }



    return squadre;


}







function mostraDati(){



    const boxTorneo=document.getElementById(
        "datiTorneo"
    );



    const squadre=getNumeroSquadre();


    const massimo=squadre*2;



    boxTorneo.innerHTML=`

    <div class="info">

        🏆 <b>${torneo.nome}</b>

        <br>

        📅 Data: ${torneo.data || "-"}

        <br>

        🎾 Formato: ${squadre} squadre

        <br>

        👥 Capacità: ${massimo} giocatori

        <br>

        Stato:
        ${
            torneo.stato==="chiuso"

            ?

            "❌ Chiuso"

            :

            "🟢 Aperto"

        }


    </div>


    `;




    const boxUtente=document.getElementById(
        "datiUtente"
    );





    if(profilo){


        boxUtente.innerHTML=`

        <div class="info">

        👤 Giocatore:

        <b>

        ${(profilo.nome || "")}
        ${(profilo.cognome || "")}

        </b>


        <br>

        📧 ${utente.email}


        </div>


        `;


    }
    else{


        boxUtente.innerHTML=`

        <div class="info">

        👤 Utente:

        <b>${utente.email}</b>


        </div>

        `;


    }



}
    async function confermaIscrizione(){


    if(!torneo || !utente){

        mostraMessaggio(
            "❌ Dati torneo o utente mancanti",
            "errore"
        );

        return;

    }




    const squadre=getNumeroSquadre();


    const limite=squadre*2;



    // controllo stato torneo

    if(torneo.stato==="chiuso"){


        mostraMessaggio(
            "❌ Torneo chiuso",
            "errore"
        );

        return;

    }




    // controllo posti disponibili

    const {

        data:iscritti,

        error:erroreLista

    } = await sb

    .from("iscrizioni")

    .select("id")

    .eq(
        "torneo_id",
        torneoId
    );




    if(erroreLista){


        console.error(
            erroreLista
        );


        mostraMessaggio(
            "❌ Errore controllo posti",
            "errore"
        );


        return;

    }





    if(
        iscritti &&
        iscritti.length>=limite
    ){


        mostraMessaggio(
            "❌ Torneo completo",
            "errore"
        );


        return;

    }





    // controllo doppia iscrizione utente

    const {

        data:giaIscritto,

        error:erroreGia

    } = await sb

    .from("iscrizioni")

    .select("id")

    .eq(
        "torneo_id",
        torneoId
    )

    .eq(
        "user_id",
        utente.id
    );





    if(erroreGia){


        console.error(
            erroreGia
        );


        mostraMessaggio(
            "❌ Errore controllo iscrizione",
            "errore"
        );


        return;

    }






    if(
        giaIscritto &&
        giaIscritto.length>0
    ){


        mostraMessaggio(
            "⚠️ Sei già iscritto a questo torneo",
            "errore"
        );


        return;

    }







    const nomeCompleto =

        profilo

        ?

        (
            (profilo.nome || "")+
            " "+
            (profilo.cognome || "")
        ).trim()

        :

        utente.email;






    const alias =

        profilo && profilo.cognome

        ?

        profilo.cognome
        .substring(0,6)
        .toUpperCase()

        :

        utente.email
        .substring(0,6)
        .toUpperCase();








    // INSERIMENTO DATABASE

    const {

        error:erroreInsert

    } = await sb

    .from("iscrizioni")

    .insert({


        torneo_id: torneoId,


        user_id: utente.id,


        nome_giocatore: alias,



        email: utente.email || "",


        telefono:
            profilo?.telefono || "",


        livello:
            profilo?.livello || "",


        note:
            profilo?.note || "",


        categoria:"Open",


        stato:"richiesta",


        approvato:false,


        data_iscrizione:
            new Date().toISOString()


    });







    if(erroreInsert){


        console.error(
            "ERRORE INSERIMENTO:",
            erroreInsert
        );


        mostraMessaggio(
            "❌ Errore iscrizione: "+
            erroreInsert.message,
            "errore"
        );


        return;

    }






    // se raggiunto limite chiude torneo

    if(
        iscritti.length+1 >= limite
    ){


        await sb

        .from("tornei")

        .update({

            stato:"chiuso"

        })

        .eq(
            "id",
            torneoId
        );


    }






    mostraMessaggio(

        "✅ Iscrizione completata",

        "successo"

    );






    setTimeout(()=>{


        window.location.href=
        "visitatore.html";


    },1500);




}
  function mostraMessaggio(testo,tipo){


    const box=document.getElementById(
        "messaggio"
    );


    if(!box){
        return;
    }


    box.className=tipo;


    box.innerHTML=`

        <p>
            ${testo}
        </p>

    `;


}




function tornaTornei(){


    window.location.href=
    "visitatore.html";


}






window.addEventListener(
    "load",
    inizializza
);


</script>


</body>

</html>
