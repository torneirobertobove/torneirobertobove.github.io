<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iscrizione Torneo</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #243041;
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #10b981;
        }

        .info {
            background: #0b1220;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back {
            background: #475569;
        }

        .back:hover {
            background: #64748b;
        }

        .successo {
            color: #22c55e;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .errore {
            color: #ef4444;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🏆 Iscrizione torneo</h2>

        <div id="datiTorneo">
            Caricamento...
        </div>

        <div id="datiUtente"></div>

        <button onclick="confermaIscrizione()">
            Conferma iscrizione
        </button>

        <button class="back" onclick="tornaTornei()">
            Torna ai tornei
        </button>

        <div id="messaggio"></div>
    </div>

    <script>
        const sb = supabase.createClient(
            "https://iybjvtmfaupgthqqsngd.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI"
        );

        const torneoId = new URLSearchParams(window.location.search).get("torneo");

        let torneo = null;
        let utente = null;
        let profilo = null;

        async function inizializza() {
            if (!torneoId) {
                mostraMessaggio("❌ Torneo non selezionato", "errore");
                return;
            }

            const { data: { user } } = await sb.auth.getUser();

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            utente = user;

            // Carica torneo
            const { data: torneoLetto, error: erroreTorneo } = await sb
                .from("tornei")
                .select("id,nome,data,configurazione,posti")
                .eq("id", torneoId)
                .single();

            if (erroreTorneo || !torneoLetto) {
                console.error("Errore caricamento torneo:", erroreTorneo);
                mostraMessaggio("❌ Errore caricamento torneo", "errore");
                return;
            }

            torneo = torneoLetto;

            // Carica profilo utente (solo colonna "nome")
            const { data: profiloLetto, error: erroreProfilo } = await sb
                .from("profili")
                .select("nome,ruolo")
                .eq("user_id", user.id)
                .single();

            if (erroreProfilo) {
                console.warn("Profilo non trovato:", erroreProfilo);
            }

            profilo = profiloLetto || null;
            mostraDati();
        }

        function mostraDati() {
            const boxTorneo = document.getElementById("datiTorneo");
            let squadre = Number(torneo.posti) || 0;

            if (torneo.configurazione && torneo.configurazione.rules && torneo.configurazione.rules.numeroSquadre) {
                squadre = Number(torneo.configurazione.rules.numeroSquadre);
            }

            const massimo = squadre * 2;

            boxTorneo.innerHTML = `
                <div class="info">
                    🏆 <b>${torneo.nome}</b>
                    <br>
                    📅 Data: ${torneo.data}
                    <br>
                    🎾 Formato: ${squadre} squadre
                    <br>
                    👥 Capacità: ${massimo} giocatori
                </div>
            `;

            const boxUtente = document.getElementById("datiUtente");

            if (profilo) {
                boxUtente.innerHTML = `
                    <div class="info">
                        👤 Giocatore:
                        <b>${profilo.nome || "Anonimo"}</b>
                        <br>
                        📧 ${utente.email}
                    </div>
                `;
            } else {
                boxUtente.innerHTML = `
                    <div class="info">
                        👤 Utente:
                        <b>${utente.email}</b>
                    </div>
                `;
            }
        }

        async function confermaIscrizione() {
            if (!torneo) {
                mostraMessaggio("❌ Errore: torneo non trovato", "errore");
                return;
            }

            let squadre = Number(torneo.posti) || 0;
            if (torneo.configurazione && torneo.configurazione.rules && torneo.configurazione.rules.numeroSquadre) {
                squadre = Number(torneo.configurazione.rules.numeroSquadre);
            }
            const limite = squadre * 2;

            // STEP 1: Controlla iscrizioni esistenti
            const { data: iscritti, error: erroreLista } = await sb
                .from("iscrizioni")
                .select("id")
                .eq("torneo_id", torneoId);

            if (erroreLista) {
                console.error("Errore lettura iscrizioni:", erroreLista);
                mostraMessaggio("❌ Errore lettura iscrizioni<br><small>" + erroreLista.message + "</small>", "errore");
                return;
            }

            const iscrittiCorrenti = iscritti ? iscritti.length : 0;

            if (iscrittiCorrenti >= limite) {
                mostraMessaggio("❌ Torneo completo", "errore");
                return;
            }

            // Prepara nome giocatore (usa email se non c'è profilo)
            const nomeGiocatore = profilo && profilo.nome
                ? profilo.nome.trim()
                : utente.email.split('@')[0].toUpperCase();

            // STEP 2: Controllo se già iscritto (usa nome_giocatore)
            const { data: giaIscritto, error: erroreControllo } = await sb
                .from("iscrizioni")
                .select("id")
                .eq("torneo_id", torneoId)
                .eq("nome_giocatore", nomeGiocatore);

            if (erroreControllo) {
                console.error("Errore controllo iscrizione:", erroreControllo);
                mostraMessaggio("❌ Errore controllo iscrizione", "errore");
                return;
            }

            if (giaIscritto && giaIscritto.length > 0) {
                mostraMessaggio("⚠️ Sei già iscritto a questo torneo", "errore");
                return;
            }

            // STEP 3: Inserimento (usa nome_giocatore, NON nome_completo)
          const { error: erroreInsert } = await sb
    .from("iscrizioni")
    .insert({

        torneo_id: torneoId,

        user_id:
        utente.id,

        nome:
        profilo?.nome || "",

        nome_giocatore:
        nomeGiocatore,

        email:
        utente.email || "",

        telefono:
        profilo?.telefono || "",

        livello:
        profilo?.livello || "",

        note:
        profilo?.note || "",

        categoria:
        "Open",

        stato:
        "richiesta",

        approvato:
        false,

        data_iscrizione:
        new Date().toISOString()

    });
            if (erroreInsert) {
                console.error("ERRORE INSERIMENTO:", erroreInsert);
                mostraMessaggio("❌ " + erroreInsert.message, "errore");
                return;
            }

            mostraMessaggio("✅ Iscrizione completata!", "successo");

            setTimeout(() => {
                window.location.href = "visitatore.html";
            }, 1500);
        }

        function tornaTornei() {
            window.location.href = "visitatore.html";
        }

        function mostraMessaggio(testo, tipo) {
            const box = document.getElementById("messaggio");
            box.className = tipo;
            box.innerHTML = `<p>${testo}</p>`;
        }

        window.addEventListener("load", inizializza);
    </script>
</body>
</html>
