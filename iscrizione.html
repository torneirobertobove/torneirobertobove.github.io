<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iscrizione Torneo</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #243041;
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #10b981;
        }

        .info {
            background: #0b1220;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 16px;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back {
            background: #475569;
        }

        .back:hover {
            background: #64748b;
        }

        .successo {
            color: #22c55e;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .errore {
            color: #ef4444;
            text-align: center;
            font-weight: bold;
        }

        .debug {
            background: #1e293b;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🏆 Iscrizione torneo</h2>

        <div id="datiTorneo">
            Caricamento...
        </div>

        <div id="datiUtente"></div>

        <button onclick="confermaIscrizione()">
            Conferma iscrizione
        </button>

        <button class="back" onclick="tornaTornei()">
            Torna ai tornei
        </button>

        <div id="messaggio"></div>

        <div id="debug" class="debug"></div>
    </div>

    <script>
        const sb = supabase.createClient(
            "https://iybjvtmfaupgthqqsngd.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI"
        );

        const torneoId = new URLSearchParams(window.location.search).get("torneo");

        let torneo = null;
        let utente = null;
        let profilo = null;

        function logDebug(msg) {
            const debugBox = document.getElementById("debug");
            debugBox.innerHTML += `<div>> ${msg}</div>`;
            console.log("[DEBUG]", msg);
        }

        async function inizializza() {
            logDebug("Inizio inizializzazione...");
            logDebug("Torneo ID: " + torneoId);

            if (!torneoId) {
                mostraMessaggio("❌ Torneo non selezionato", "errore");
                return;
            }

            const { data: { user } } = await sb.auth.getUser();
            logDebug("User ID: " + (user ? user.id : "NULL"));

            if (!user) {
                window.location.href = "index.html";
                return;
            }

            utente = user;

            const { data: torneoLetto, error: erroreTorneo } = await sb
                .from("tornei")
                .select("id,nome,data,configurazione,posti")
                .eq("id", torneoId)
                .single();

            if (erroreTorneo || !torneoLetto) {
                logDebug("Errore torneo: " + JSON.stringify(erroreTorneo));
                mostraMessaggio("❌ Errore caricamento torneo", "errore");
                return;
            }

            torneo = torneoLetto;
            logDebug("Torneo caricato: " + torneo.nome);

            const { data: profiloLetto, error: erroreProfilo } = await sb
                .from("profili")
                .select("nome,cognome,ruolo")
                .eq("user_id", user.id)
                .single();

            if (erroreProfilo) {
                logDebug("Profilo non trovato o errore: " + JSON.stringify(erroreProfilo));
            } else {
                logDebug("Profilo caricato");
            }

            profilo = profiloLetto || null;
            mostraDati();
        }

        function mostraDati() {
            const boxTorneo = document.getElementById("datiTorneo");
            let squadre = Number(torneo.posti) || 0;

            if (torneo.configurazione && torneo.configurazione.rules && torneo.configurazione.rules.numeroSquadre) {
                squadre = Number(torneo.configurazione.rules.numeroSquadre);
            }

            const massimo = squadre * 2;

            boxTorneo.innerHTML = `
                <div class="info">
                    🏆 <b>${torneo.nome}</b>
                    <br>
                    📅 Data: ${torneo.data}
                    <br>
                    🎾 Formato: ${squadre} squadre
                    <br>
                    👥 Capacità: ${massimo} giocatori
                </div>
            `;

            const boxUtente = document.getElementById("datiUtente");

            if (profilo) {
                boxUtente.innerHTML = `
                    <div class="info">
                        👤 Giocatore:
                        <b>${profilo.nome || ""} ${profilo.cognome || ""}</b>
                        <br>
                        📧 ${utente.email}
                    </div>
                `;
            } else {
                boxUtente.innerHTML = `
                    <div class="info">
                        👤 Utente:
                        <b>${utente.email}</b>
                    </div>
                `;
            }
        }

        async function confermaIscrizione() {
            logDebug("=== INIZIO ISCRIZIONE ===");
            
            if (!torneo) {
                mostraMessaggio("❌ Errore: torneo non trovato", "errore");
                return;
            }

            let squadre = Number(torneo.posti) || 0;
            if (torneo.configurazione && torneo.configurazione.rules && torneo.configurazione.rules.numeroSquadre) {
                squadre = Number(torneo.configurazione.rules.numeroSquadre);
            }
            const limite = squadre * 2;

            logDebug("Torneo ID: " + torneoId);
            logDebug("User ID: " + utente.id);
            logDebug("Limite giocatori: " + limite);

            // STEP 1: Controlla iscrizioni esistenti
            logDebug("STEP 1: Controllo iscrizioni esistenti...");
            const { data: iscritti, error: erroreLista } = await sb
                .from("iscrizioni")
                .select("id, nome_giocatore, nome_completo, torneo_id")
                .eq("torneo_id", torneoId);

            if (erroreLista) {
                logDebug("ERRORE STEP 1: " + JSON.stringify(erroreLista));
                mostraMessaggio("❌ Errore lettura iscrizioni<br><small>" + erroreLista.message + "</small>", "errore");
                return;
            }

            const iscrittiCorrenti = iscritti ? iscritti.length : 0;
            logDebug("Iscritti correnti: " + iscrittiCorrenti);

            if (iscrittiCorrenti >= limite) {
                mostraMessaggio("❌ Torneo completo", "errore");
                return;
            }

            // STEP 2: Controllo se già iscritto
            logDebug("STEP 2: Controllo se già iscritto...");
            const { data: giaIscritto, error: erroreControllo } = await sb
                .from("iscrizioni")
                .select("id")
                .eq("torneo_id", torneoId)
                .eq("nome_completo", utente.email);

            if (erroreControllo) {
                logDebug("ERRORE STEP 2: " + JSON.stringify(erroreControllo));
                mostraMessaggio("❌ Errore controllo iscrizione<br><small>" + erroreControllo.message + "</small>", "errore");
                return;
            }

            const giaPresente = giaIscritto && giaIscritto.length > 0;
            logDebug("Già iscritto: " + giaPresente);

            if (giaPresente) {
                mostraMessaggio("⚠️ Sei già iscritto a questo torneo", "errore");
                return;
            }

            // Prepara dati
            const nomeCompleto = profilo && (profilo.nome || profilo.cognome)
                ? `${profilo.nome || ""} ${profilo.cognome || ""}`.trim()
                : utente.email;

            const alias = profilo && profilo.cognome
                ? profilo.cognome.substring(0, 6).toUpperCase()
                : utente.email.substring(0, 6).toUpperCase();

            logDebug("Nome completo: " + nomeCompleto);
            logDebug("Alias: " + alias);

            // STEP 3: Inserimento
            logDebug("STEP 3: Inserimento iscrizione...");
            const { data: insertResult, error: erroreInsert } = await sb
                .from("iscrizioni")
                .insert({
                    torneo_id: torneoId,
                    nome_giocatore: alias,
                    nome_completo: nomeCompleto,
                    categoria: "Open",
                    data_iscrizione: new Date().toISOString()
                })
                .select();

            if (erroreInsert) {
                logDebug("ERRORE STEP 3: " + JSON.stringify(erroreInsert));
                mostraMessaggio("❌ Errore inserimento<br><small style='font-size:11px'>" + erroreInsert.message + "</small>", "errore");
                return;
            }

            logDebug("INSERIMENTO RIUSCITO! ID: " + (insertResult ? insertResult[0]?.id : "OK"));
            mostraMessaggio("✅ Iscrizione completata!", "successo");

            setTimeout(() => {
                window.location.href = "visitatore.html";
            }, 1500);
        }

        function tornaTornei() {
            window.location.href = "visitatore.html";
        }

        function mostraMessaggio(testo, tipo) {
            const box = document.getElementById("messaggio");
            box.className = tipo;
            box.innerHTML = `<p>${testo}</p>`;
        }

        window.addEventListener("load", inizializza);
    </script>
</body>
</html>
