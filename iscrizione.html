<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Iscrizione Tornei</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{

    background:#0f172a;
    color:white;
    font-family:system-ui;
    margin:0;
    padding:20px;

}


.container{

    max-width:800px;
    margin:auto;

}


h1{

    text-align:center;
    color:#10b981;

}


.card{

    background:#111827;
    border:1px solid #243041;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;

}


.info{

    margin:8px 0;

}


.lista{

    background:#0b1220;
    padding:12px;
    border-radius:8px;
    margin-top:10px;

}


.squadra{

    background:#064e3b;
    padding:10px;
    border-radius:8px;
    margin-top:6px;

}


button{

    width:100%;
    padding:12px;
    margin-top:12px;
    border:0;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;

}


button:disabled{

    background:#555;
    cursor:not-allowed;

}


input{

    width:100%;
    padding:10px;
    margin-top:8px;
    box-sizing:border-box;
    border-radius:6px;
    border:1px solid #ccc;

}


.errore{

    color:#ef4444;
    text-align:center;

}


.successo{

    color:#22c55e;
    text-align:center;

}


.modal{

    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0009;
    justify-content:center;
    align-items:center;

}


.modal-box{

    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:400px;

}


</style>


</head>



<body>


<div class="container">


<h1>
🏆 Tornei disponibili
</h1>


<div id="messaggio"></div>


<div id="listaTornei">

Caricamento tornei...

</div>


</div>



<!-- MODALE ISCRIZIONE -->


<div id="modalIscrizione" class="modal">


<div class="modal-box">


<h3>
Iscrizione giocatore
</h3>


<input
id="nome"
placeholder="Nome">


<input
id="cognome"
placeholder="Cognome">


<button onclick="confermaIscrizione()">

Conferma iscrizione

</button>


<button onclick="chiudiModal()"
style="background:#666">

Annulla

</button>


</div>


</div>



<script>


/*
================================
SUPABASE
================================
*/


const supabaseUrl =

"https://iybjvtmfaupgthqqsngd.supabase.co";



const supabaseKey =

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";



const sb =

supabase.createClient(

supabaseUrl,

supabaseKey

);



let torneoSelezionato = null;


  /*
================================
CARICAMENTO TORNEI PUBBLICATI
================================
*/


async function caricaTornei(){


const box =

document.getElementById(
"listaTornei"
);



const {

data,
error

}

=

await sb

.from("tornei")

.select(
"id,nome,data,posti"
)

.eq(
"pubblicato",
true
)

.order(
"data",
{
ascending:true
}
);





if(error){


console.error(
"Errore caricamento tornei:",
error
);



box.innerHTML =

`

<p class="errore">

Errore caricamento tornei

</p>

`;



return;


}







if(!data || data.length===0){


box.innerHTML =

`

<p>

Nessun torneo disponibile

</p>

`;



return;


}







box.innerHTML="";







for(const torneo of data){



await creaSchedaTorneo(
torneo
);



}



}







/*
================================
CREA SCHEDA TORNEO
================================
*/


async function creaSchedaTorneo(
torneo
){


const box =

document.getElementById(
"listaTornei"
);






const {

data:iscritti,
error

}

=

await sb

.from("iscrizioni")

.select(
"id,nome_giocatore,nome_completo"
)

.eq(
"torneo_id",
torneo.id
)

.order(
"id",
{
ascending:true
}
);






if(error){


console.error(
"Errore lettura iscritti:",
error
);


return;


}






const squadreTotali =

Number(torneo.posti) || 0;






/*

ATTENZIONE:
PADel:
1 squadra = 2 giocatori

*/

const giocatoriMassimi =

squadreTotali * 2;





const iscrittiAttuali =

iscritti.length;






const postiLiberi =

giocatoriMassimi - iscrittiAttuali;






const chiuso =

iscrittiAttuali >= giocatoriMassimi;







box.innerHTML +=



`

<div class="card">


<h2>

🏆 ${torneo.nome}

</h2>



<div class="info">

📅 ${torneo.data}

</div>




<div class="info">

🎾 Formato:

${squadreTotali}

squadre

</div>




<div class="info">

👥 Iscritti:

${iscrittiAttuali}/${giocatoriMassimi}

giocatori

</div>




<button

onclick="apriIscrizione(${torneo.id})"

${chiuso ? "disabled":""}

>

${

chiuso

?

"❌ ISCRIZIONI CHIUSE"

:

"ISCRIVITI"

}


</button>



<div id="lista-${torneo.id}">


</div>



</div>

`;






mostraDettagliTorneo(

torneo.id,

iscritti,

postiLiberi,

chiuso

);



}

   /*
================================
DETTAGLIO TORNEO
ISCRITTI + COPPIE
================================
*/


function mostraDettagliTorneo(

torneoId,

iscritti,

postiLiberi,

chiuso

){


const area =

document.getElementById(

"lista-"+torneoId

);



if(!area){

return;

}






let lista = "";





if(iscritti.length===0){


lista =

`

<p>

Nessun giocatore iscritto

</p>

`;



}else{



iscritti.forEach(

(giocatore,index)=>{


lista +=


`

<div>

${index+1}.

${giocatore.nome_completo}

<br>

&nbsp;&nbsp; Alias:

<b>

${giocatore.nome_giocatore}

</b>

</div>

`;



});


}








/*
================================
CREAZIONE COPPIE AUTOMATICHE
1 squadra = 2 giocatori
================================
*/



let coppie = "";





for(

let i=0;

i<iscritti.length;

i+=2

){



if(

iscritti[i+1]

){



const numeroSquadra =

(i/2)+1;



coppie +=


`

<div class="squadra">


🎾 Squadra ${numeroSquadra}


<br>


${iscritti[i].nome_completo}


+

<br>


${iscritti[i+1].nome_completo}


</div>


`;



}



}








area.innerHTML =


`



<div class="lista">


<h3>

Lista iscritti

</h3>


${lista}


</div>





<div class="info">


${

chiuso


?


"❌ ISCRIZIONI CHIUSE - TORNEO COMPLETO"


:


"🟢 Posti disponibili: "

+

postiLiberi

+

" giocatori"


}



</div>







<div class="lista">


<h3>

Squadre create

</h3>


${


coppie ||


"Ancora nessuna coppia completa"



}


</div>




`;



}






/*
================================
APERTURA MODALE ISCRIZIONE
================================
*/


function apriIscrizione(

id

){


torneoSelezionato = id;



document.getElementById(

"nome"

).value="";



document.getElementById(

"cognome"

).value="";




document.getElementById(

"modalIscrizione"

).style.display =

"flex";



}





/*
================================
CHIUDI MODALE
================================
*/


function chiudiModal(){


document.getElementById(

"modalIscrizione"

).style.display =

"none";



}
/*
================================
CONFERMA ISCRIZIONE
================================
*/


async function confermaIscrizione(){



const nome =

document.getElementById(
"nome"
)
.value
.trim();




const cognome =

document.getElementById(
"cognome"
)
.value
.trim();






if(!nome || !cognome){


mostraMessaggio(

"Inserire nome e cognome",

"errore"

);


return;


}








/*
================================
CREAZIONE ALIAS
prime 6 lettere cognome
MAIUSCOLO
================================
*/


const alias =


cognome

.substring(
0,
6
)

.toUpperCase();






const nomeCompleto =


nome

+

" "

+

cognome;







/*
================================
CONTROLLO TORNEO
================================
*/


const {

data:torneo,

error:erroreTorneo

}

=

await sb

.from("tornei")

.select(
"id,posti,nome"
)

.eq(

"id",

torneoSelezionato

)

.single();







if(erroreTorneo || !torneo){


mostraMessaggio(

"Errore lettura torneo",

"errore"

);


return;


}







/*
================================
NUMERO MASSIMO GIOCATORI

posti = squadre

1 squadra = 2 giocatori

================================
*/


const massimoGiocatori =


Number(torneo.posti)

*

2;







const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(

"id"

)

.eq(

"torneo_id",

torneoSelezionato

);







if(

iscritti.length >= massimoGiocatori

){


chiudiModal();



mostraMessaggio(

"❌ Torneo completo",

"errore"

);


return;


}









/*
================================
CONTROLLO DOPPIONE
================================
*/


const {

data:giaPresente

}

=

await sb

.from("iscrizioni")

.select(

"id,nome_completo"

)

.eq(

"torneo_id",

torneoSelezionato

)

.ilike(

"nome_completo",

nomeCompleto

);









if(

giaPresente

&&

giaPresente.length>0

){



mostraMessaggio(

"⚠️ Giocatore già iscritto a questo torneo",

"errore"

);



return;


}









/*
================================
SALVATAGGIO ISCRIZIONE
================================
*/


const {

error

}

=

await sb

.from("iscrizioni")

.insert({


torneo_id:

torneoSelezionato,



nome_giocatore:

alias,



nome_completo:

nomeCompleto,



categoria:

"Open",



data_iscrizione:

new Date()

.toISOString()



});









if(error){


console.error(

"Errore iscrizione:",

error

);



mostraMessaggio(

"Errore durante iscrizione",

"errore"

);



return;


}








chiudiModal();





mostraMessaggio(

"✅ Iscrizione effettuata: "

+

alias,

"successo"

);








caricaTornei();






}
/*
================================
MESSAGGI UTENTE
================================
*/


function mostraMessaggio(

testo,

tipo

){



const box =

document.getElementById(

"messaggio"

);



box.className = tipo;



box.innerHTML =


`

<p>

${testo}

</p>

`;





setTimeout(()=>{


box.innerHTML="";

box.className="";


},4000);



}








/*
================================
RICARICA AUTOMATICA TORNEI
================================
*/


async function aggiornaLista(){


await caricaTornei();



}








/*
================================
CONTROLLO STATO TORNEO
================================
*/


async function controllaPosti(

torneoId

){



const {

data:torneo

}

=

await sb

.from("tornei")

.select(

"posti"

)

.eq(

"id",

torneoId

)

.single();







if(!torneo){

return false;

}






const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(

"id"

)

.eq(

"torneo_id",

torneoId

);







const limite =


Number(torneo.posti)

*

2;






return iscritti.length >= limite;



}








/*
================================
AGGIORNAMENTO SINGOLO TORNEO
================================
*/


async function aggiornaTorneo(

torneoId

){



const chiuso =

await controllaPosti(

torneoId

);





if(chiuso){


caricaTornei();


}



}
/*
================================
SOSTITUZIONE CONFERMA ISCRIZIONE
CON CONTROLLO COMPLETO
================================
*/


const confermaOriginale = confermaIscrizione;



confermaIscrizione = async function(){



if(invioInCorso){


return;


}



invioInCorso = true;






try{


await confermaOriginale();





if(torneoSelezionato){



await verificaChiusuraTorneo(

torneoSelezionato

);



await aggiornaLista();



}



}

finally{


invioInCorso = false;


}



};









/*
================================
CONTROLLO RIEPILOGO TORNEO
================================
*/


async function riepilogoTorneo(

torneoId

){



const {

data:torneo

}

=

await sb

.from("tornei")

.select(

"nome,posti,data"

)

.eq(

"id",

torneoId

)

.single();






const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(

"nome_completo"

)

.eq(

"torneo_id",

torneoId

)

.order(

"id",

{

ascending:true

}

);







if(!torneo){

return;

}







console.log(

"TORNEO",

torneo.nome

);





console.log(

"DATA",

torneo.data

);





console.log(

"ISCRITTI",

iscritti

);





}


</script>


</body>


</html>
