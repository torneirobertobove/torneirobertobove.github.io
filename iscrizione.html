<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Iscrizione Tornei</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

.container{
    max-width:750px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{

    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 8px #ccc;

}


.titolo{

    font-size:22px;
    font-weight:bold;

}


.info{

    margin:8px 0;
    color:#555;

}


.lista{

    background:#f9fafb;
    padding:10px;
    border-radius:8px;
    margin-top:10px;

}


button{

    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:0;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;

}


button:hover{

    background:#1d4ed8;

}


button:disabled{

    background:#999;
    cursor:not-allowed;

}


input{

    width:100%;
    padding:10px;
    margin:5px 0 10px;
    box-sizing:border-box;

}


.errore{

    color:red;
    text-align:center;

}


.successo{

    color:green;
    text-align:center;

}


.squadra{

    background:#e0f2fe;
    padding:8px;
    margin:5px 0;
    border-radius:6px;

}


</style>

</head>


<body>


<div class="container">


<h1>
🏆 Iscrizione Tornei
</h1>


<div id="messaggio"></div>


<div id="listaTornei">

Caricamento...

</div>


</div>



<script>


/*
==============================
SUPABASE
==============================
*/


const supabaseUrl =
'https://iybjvtmfaupgthqqsngd.supabase.co';



const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI';



const sb =
supabase.createClient(
supabaseUrl,
supabaseKey
);



let torneoSelezionato = null;


 
/*
==============================
CARICAMENTO TORNEI
==============================
*/


async function caricaTornei(){


const box =
document.getElementById(
"listaTornei"
);



const {data,error}=

await sb

.from("tornei")

.select(
"id,nome,data,posti"
)

.eq(
"pubblicato",
true
)

.order(
"data",
{
ascending:true
}
);





if(error){


console.error(
"Errore caricamento tornei:",
error
);


box.innerHTML =
"<p class='errore'>Errore caricamento tornei</p>";


return;


}






if(!data || data.length===0){


box.innerHTML =
"<p>Nessun torneo disponibile</p>";


return;


}






box.innerHTML="";






for(const torneo of data){



await creaCardTorneo(torneo);



}



}








/*
==============================
CREA CARD TORNEO
==============================
*/


async function creaCardTorneo(torneo){



const box =
document.getElementById(
"listaTornei"
);




const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(
"id,nome_giocatore,nome_completo"
)

.eq(
"torneo_id",
torneo.id
)

.order(
"id",
{
ascending:true
}
);





const numeroSquadre =
Number(torneo.posti)||0;



const limiteGiocatori =
numeroSquadre * 2;



const numeroIscritti =
iscritti ?
iscritti.length :
0;




const postiLiberi =
limiteGiocatori - numeroIscritti;




const torneoChiuso =
numeroIscritti >= limiteGiocatori;







let elenco="";





if(numeroIscritti===0){


elenco =
"Nessun iscritto";


}else{



iscritti.forEach(
(g,i)=>{


elenco +=

`

<div>

${i+1}. 
${g.nome_giocatore}

</div>

`;


}

);


}








let squadre="";




for(
let i=0;
i<iscritti.length;
i+=2
){


if(
iscritti[i+1]
){


let numero =
(i/2)+1;



squadre +=


`

<div class="squadra">

🎾 Squadra ${numero}

<br>

${iscritti[i].nome_giocatore}

+

${iscritti[i+1].nome_giocatore}

</div>


`;



}



}










box.innerHTML +=



`

<div class="card">


<div class="titolo">

🏆 ${torneo.nome}

</div>


<div class="info">

📅 ${torneo.data}

</div>



<div class="info">

🎾 Formato:
${numeroSquadre} squadre

</div>




<div class="info">

👥 Iscritti:

${numeroIscritti}/${limiteGiocatori}

giocatori

</div>





<div class="lista">

<b>
Lista iscritti:
</b>

<br><br>

${elenco}

</div>





<div class="lista">

<b>

Squadre formate:

</b>


<br>

${squadre || "In attesa di giocatori"}

</div>





<div class="info">


${
torneoChiuso

?

"❌ ISCRIZIONI CHIUSE - TORNEO COMPLETO"

:

"🟢 Posti disponibili: "+postiLiberi+" giocatori"

}


</div>






<button

onclick="apriIscrizione(${torneo.id})"

${torneoChiuso ? "disabled":""}

>

${
torneoChiuso
?
"CHIUSO"
:
"ISCRIVITI"
}

</button>




</div>



`;





}

    

/*
==============================
APERTURA ISCRIZIONE
==============================
*/


function apriIscrizione(id){


torneoSelezionato = id;



const nome =
prompt(
"Inserisci nome:"
);



if(!nome){

return;

}



const cognome =
prompt(
"Inserisci cognome:"
);



if(!cognome){

return;

}




salvaIscrizione(
nome,
cognome
);



}








/*
==============================
SALVA ISCRIZIONE
==============================
*/


async function salvaIscrizione(
nome,
cognome
){





const nomeCompleto =
nome.trim()
+
" "
+
cognome.trim();





const alias =

cognome

.trim()

.substring(
0,
6
)

.toUpperCase();









/*
CONTROLLO UTENTE
GIÀ ISCRITTO
*/


const {

data:esistente

}

=

await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
torneoSelezionato
)

.eq(
"nome_completo",
nomeCompleto
);








if(
esistente &&
esistente.length>0
){



mostraMessaggio(

"⚠️ Giocatore già iscritto"

,
"errore"

);



return;


}









/*
CONTROLLO POSTI
*/


const {

data:torneo

}

=

await sb

.from("tornei")

.select(
"posti"
)

.eq(
"id",
torneoSelezionato
)

.single();







if(!torneo){


mostraMessaggio(
"Errore torneo",
"errore"
);


return;


}








const massimoGiocatori =

Number(torneo.posti)

*

2;








const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
torneoSelezionato
);









if(
iscritti.length >= massimoGiocatori
){


mostraMessaggio(

"❌ Torneo completo"

,
"errore"

);


return;


}











/*
INSERIMENTO
*/


const {

error

}

=

await sb

.from("iscrizioni")

.insert({

torneo_id:
torneoSelezionato,


nome_giocatore:
alias,


nome_completo:
nomeCompleto,


categoria:
"Open",


data_iscrizione:
new Date()
.toISOString()


});










if(error){


console.error(
"Errore iscrizione:",
error
);



mostraMessaggio(

"Errore durante iscrizione"

,
"errore"

);



return;


}










mostraMessaggio(

"✅ Iscrizione completata: "

+
alias

,
"successo"

);







caricaTornei();





}









/*
==============================
MESSAGGI
==============================
*/


function mostraMessaggio(
testo,
tipo
){



const box =
document.getElementById(
"messaggio"
);



box.className =
tipo;



box.innerHTML =
`

<p>

${testo}

</p>

`;




setTimeout(()=>{


box.innerHTML="";


},4000);



}




/*
==============================
AGGIORNAMENTO AUTOMATICO
==============================
*/


async function aggiornaIscrizioni(){


await caricaTornei();


}








/*
==============================
AVVIO PAGINA
==============================
*/


caricaTornei();




</script>


</body>

</html>
