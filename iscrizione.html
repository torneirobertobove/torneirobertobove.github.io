<body>

<script>
const supabaseUrl="https://iybjvtmfaupgthqqsngd.supabase.co";

const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

const sb=supabase.createClient(supabaseUrl,supabaseKey);

let torneoSelezionato=null;
let invioInCorso=false;

function getNumeroSquadre(torneo){
return Number(torneo.configurazione?.rules?.numeroSquadre)||0;
}
    // BLOCCO 2/8

async function caricaTornei(){

const box=document.getElementById("listaTornei");

const {data,error}=await sb
.from("tornei")
.select("id,nome,data,configurazione")
.eq("pubblicato",true)
.order("data",{ascending:true});

if(error){
console.error("Errore caricamento tornei:",error);
box.innerHTML="<p class='errore'>Errore caricamento tornei</p>";
return;
}

if(!data||data.length===0){
box.innerHTML="<p>Nessun torneo disponibile</p>";
return;
}

box.innerHTML="";

for(const torneo of data){
await creaSchedaTorneo(torneo);
}

}



async function creaSchedaTorneo(torneo){

const box=document.getElementById("listaTornei");

const {data:iscritti,error}=await sb
.from("iscrizioni")
.select("id,nome_giocatore,nome_completo")
.eq("torneo_id",torneo.id)
.order("id",{ascending:true});


if(error){
console.error("Errore iscritti:",error);
return;
}


const squadre=getNumeroSquadre(torneo);

const massimoGiocatori=squadre*2;

const tot=iscritti.length;

const disponibili=massimoGiocatori-tot;

const chiuso=tot>=massimoGiocatori;


box.innerHTML+=`

<div class="card">

<h2>
🏆 ${torneo.nome}
</h2>

<div class="info">
📅 ${torneo.data}
</div>

<div class="info">
🎾 Formato: ${squadre} squadre
</div>

<div class="info">
👥 Iscritti: ${tot}/${massimoGiocatori} giocatori
</div>

<div class="info">
${chiuso?
"❌ ISCRIZIONI CHIUSE - TORNEO COMPLETO":
"🟢 Posti disponibili: "+disponibili+" giocatori"}
</div>


<button onclick="apriIscrizione(${torneo.id})"
${chiuso?"disabled":""}>

${chiuso?"TORNEO COMPLETO":"ISCRIVITI"}

</button>


<div id="lista-${torneo.id}"></div>

</div>

`;


mostraDettagliTorneo(
torneo.id,
iscritti,
disponibili,
chiuso
);

}
 // BLOCCO 3/8

function mostraDettagliTorneo(torneoId,iscritti,postiLiberi,chiuso){

const area=document.getElementById("lista-"+torneoId);

if(!area)return;


let lista="";


if(iscritti.length===0){

lista="<p>Nessun giocatore iscritto</p>";

}else{

iscritti.forEach((g,i)=>{

lista+=`

<div>
<b>${i+1}.</b> ${g.nome_completo}
<br>
&nbsp;&nbsp;Alias:
<b>${g.nome_giocatore}</b>
</div>
<hr>

`;

});

}



let coppie="";


for(let i=0;i<iscritti.length;i+=2){

if(iscritti[i+1]){

coppie+=`

<div class="squadra">

🎾 Squadra ${(i/2)+1}

<br><br>

${iscritti[i].nome_completo}

<br>+

<br>

${iscritti[i+1].nome_completo}

</div>

`;

}

}



area.innerHTML=`

<div class="lista">

<h3>👥 Lista iscritti</h3>

${lista}

</div>


<div class="info">

${chiuso?
"❌ ISCRIZIONI CHIUSE - TORNEO COMPLETO":
"🟢 Posti disponibili: "+postiLiberi+" giocatori"}

</div>


<div class="lista">

<h3>🎾 Squadre create</h3>

${coppie||"Ancora nessuna coppia completa"}

</div>

`;

}

 // BLOCCO 4/8

function apriIscrizione(id){

torneoSelezionato=id;

document.getElementById("nome").value="";
document.getElementById("cognome").value="";

document.getElementById("modalIscrizione").style.display="flex";

}



function chiudiModal(){

document.getElementById("modalIscrizione").style.display="none";

}



function mostraMessaggio(testo,tipo){

const box=document.getElementById("messaggio");

box.className=tipo;

box.innerHTML=`

<p>${testo}</p>

`;

setTimeout(()=>{

box.innerHTML="";
box.className="";

},4000);

}



async function controllaPosti(torneoId){

const {data:torneo}=await sb
.from("tornei")
.select("configurazione")
.eq("id",torneoId)
.single();


if(!torneo)return false;


const limite=getNumeroSquadre(torneo)*2;


const {data:iscritti}=await sb
.from("iscrizioni")
.select("id")
.eq("torneo_id",torneoId);


return iscritti.length>=limite;

}



async function verificaChiusuraTorneo(torneoId){

const chiuso=await controllaPosti(torneoId);


if(chiuso){

await sb
.from("tornei")
.update({
stato:"chiuso"
})
.eq("id",torneoId);

}

}
// BLOCCO 5/8

async function confermaIscrizione(){

if(invioInCorso)return;

invioInCorso=true;

try{

const nome=document.getElementById("nome").value.trim();

const cognome=document.getElementById("cognome").value.trim();


if(!nome||!cognome){

mostraMessaggio(
"Inserire nome e cognome",
"errore"
);

return;

}



const alias=cognome.substring(0,6).toUpperCase();

const nomeCompleto=nome+" "+cognome;



const {data:torneo,error}=await sb
.from("tornei")
.select("configurazione")
.eq("id",torneoSelezionato)
.single();


if(error||!torneo){

mostraMessaggio(
"Errore lettura torneo",
"errore"
);

return;

}



const massimo=getNumeroSquadre(torneo)*2;



const {data:iscritti}=await sb
.from("iscrizioni")
.select("id")
.eq("torneo_id",torneoSelezionato);



if(iscritti.length>=massimo){

chiudiModal();

mostraMessaggio(
"❌ Torneo completo",
"errore"
);

return;

}




const {data:giaPresente}=await sb
.from("iscrizioni")
.select("id")
.eq("torneo_id",torneoSelezionato)
.ilike("nome_completo",nomeCompleto);



if(giaPresente&&giaPresente.length>0){

mostraMessaggio(
"⚠️ Giocatore già iscritto",
"errore"
);

return;

}




const {error:erroreInserimento}=await sb
.from("iscrizioni")
.insert({

torneo_id:torneoSelezionato,

nome_giocatore:alias,

nome_completo:nomeCompleto,

categoria:"Open",

data_iscrizione:new Date().toISOString()

});



if(erroreInserimento){

console.error(erroreInserimento);

mostraMessaggio(
"Errore durante iscrizione",
"errore"
);

return;

}



chiudiModal();


await verificaChiusuraTorneo(torneoSelezionato);


mostraMessaggio(
"✅ Iscrizione completata: "+alias,
"successo"
);


await caricaTornei();


}

finally{

invioInCorso=false;

}

}

async function aggiornaDopoIscrizione(){

await verificaChiusuraTorneo(
torneoSelezionato
);

function pulisciCampiIscrizione(){

document.getElementById("nome").value="";

document.getElementById("cognome").value="";

}




function chiudiSeCompleto(){

if(!torneoSelezionato)return;


controllaPosti(
torneoSelezionato
)
.then(chiuso=>{


if(chiuso){

document.querySelectorAll("button")
.forEach(b=>{

if(b.innerText==="ISCRIVITI"){

b.disabled=true;

}

});


}


});


}

if(e.key==="Escape"){

async function ricaricaDopoModifica(){

async function statoTorneo(torneoId){

const {data:torneo}=await sb
.from("tornei")
.select("configurazione,stato")
.eq("id",torneoId)
.single();


if(!torneo)return null;


const massimo=getNumeroSquadre(torneo)*2;


const {data:iscritti}=await sb
.from("iscrizioni")
.select("id")
.eq("torneo_id",torneoId);



return {

stato:
iscritti.length>=massimo
?
"chiuso"
:
"attivo",

iscritti:
iscritti.length,

massimo:
massimo

};


}




async function aggiornaStatoVisitatore(torneoId){

const stato=await statoTorneo(torneoId);


if(!stato)return;


if(stato.stato==="chiuso"){


await sb
.from("tornei")
.update({
stato:"chiuso"
})
.eq("id",torneoId);



}



}
