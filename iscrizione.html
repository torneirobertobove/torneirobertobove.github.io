<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Iscrizione Tornei</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
    color:#10b981;
}


.card{

    background:#111827;
    border:1px solid #243041;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;

}


.info{

    margin:8px 0;

}


.lista{

    background:#0b1220;
    padding:12px;
    border-radius:8px;
    margin-top:10px;

}


.squadra{

    background:#064e3b;
    padding:8px;
    border-radius:6px;
    margin:5px 0;

}


button{

    width:100%;
    padding:12px;
    margin-top:10px;
    border:0;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;

}


button:disabled{

    background:#555;
    cursor:not-allowed;

}


.errore{

    color:#ef4444;
    text-align:center;

}


.successo{

    color:#22c55e;
    text-align:center;

}


</style>

</head>


<body>


<div class="container">


<h1>
🏆 Tornei disponibili
</h1>


<div id="messaggio"></div>


<div id="listaTornei">

Caricamento tornei...

</div>


</div>



<script>


/*
================================
SUPABASE
================================
*/


const supabaseUrl =
"https://iybjvtmfaupgthqqsngd.supabase.co";


const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";


const sb =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);



let torneoCorrente = null;



/*
================================
CARICA TORNEI
================================
*/


async function caricaTornei(){


const box =
document.getElementById(
"listaTornei"
);



const {data,error}=

await sb
.from("tornei")
.select(
"id,nome,data,posti"
)
.eq(
"pubblicato",
true
)
.order(
"data",
{
ascending:true
}
);



if(error){

console.error(error);

box.innerHTML =
"<p class='errore'>Errore caricamento tornei</p>";

return;

}



if(!data || data.length===0){

box.innerHTML =
"<p>Nessun torneo disponibile</p>";

return;

}



box.innerHTML="";



for(const torneo of data){

await mostraTorneo(torneo);

}


}


/*
================================
MOSTRA TORNEO
================================
*/


async function mostraTorneo(torneo){


const box =
document.getElementById(
"listaTornei"
);




const {data:iscritti,error}=

await sb
.from("iscrizioni")
.select(
"id,nome_giocatore,nome_completo"
)
.eq(
"torneo_id",
torneo.id
)
.order(
"id",
{
ascending:true
}
);




if(error){

console.error(
"Errore iscritti:",
error
);

return;

}





/*
1 squadra = 2 giocatori
*/

const numeroSquadre =
Number(torneo.posti)||0;


const massimoGiocatori =
numeroSquadre * 2;



const totaleIscritti =
iscritti ?
iscritti.length :
0;



const disponibili =
massimoGiocatori - totaleIscritti;



const chiuso =
totaleIscritti >= massimoGiocatori;







let elenco = "";



if(totaleIscritti===0){


elenco =
"Nessun iscritto";


}else{


iscritti.forEach(
(g,i)=>{


elenco +=
`

<div>
${i+1}. ${g.nome_completo}
</div>

`;



});


}








/*
CREAZIONE COPPIE
*/


let squadre="";


for(
let i=0;
i<iscritti.length;
i+=2
){



if(
iscritti[i+1]
){


const numero =
(i/2)+1;



squadre +=

`

<div class="squadra">

🎾 Squadra ${numero}

<br>

${iscritti[i].nome_giocatore}

+

${iscritti[i+1].nome_giocatore}

</div>

`;



}


}








box.innerHTML +=


`

<div class="card">


<h2>

🏆 ${torneo.nome}

</h2>



<div class="info">

📅 ${torneo.data}

</div>




<div class="info">

🎾 Formato:
${numeroSquadre} squadre

</div>




<div class="info">

👥 Iscritti:

${totaleIscritti}/${massimoGiocatori}

giocatori

</div>





<div class="lista">

<b>

Lista iscritti:

</b>

<br><br>

${elenco}

</div>





<div class="lista">

<b>

Squadre formate:

</b>


<br>

${
squadre ||
"In attesa di giocatori"
}


</div>





<div class="info">


${
chiuso

?

"❌ ISCRIZIONI CHIUSE - TORNEO COMPLETO"

:

"🟢 Posti disponibili: "+disponibili+" giocatori"

}


</div>






<button

onclick="iscriviti(${torneo.id})"

${chiuso ? "disabled":""}

>

${
chiuso
?
"CHIUSO"
:
"ISCRIVITI"
}


</button>



</div>


`;



}
 /*
================================
ISCRIZIONE GIOCATORE
================================
*/


async function iscriviti(torneoId){


torneoCorrente = torneoId;



const nome =
prompt(
"Inserisci nome:"
);



if(!nome || nome.trim()===""){

return;

}




const cognome =
prompt(
"Inserisci cognome:"
);



if(!cognome || cognome.trim()===""){

return;

}







const nomeCompleto =

nome.trim()
+
" "
+
cognome.trim();






/*
ALIAS:
prime 6 lettere cognome
MAIUSCOLO
*/


const alias =

cognome

.trim()

.substring(
0,
6
)

.toUpperCase();









/*
CONTROLLO TORNEO
E POSTI DISPONIBILI
*/


const {

data:torneo

}

=

await sb

.from("tornei")

.select(
"posti"
)

.eq(
"id",
torneoId
)

.single();





if(!torneo){


mostraMessaggio(
"Errore torneo",
"errore"
);


return;


}






const limite =

Number(torneo.posti)

*

2;







const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
torneoId
);







if(
iscritti.length >= limite
){


mostraMessaggio(

"❌ Torneo completo"

,
"errore"

);


return;


}











/*
CONTROLLO DOPPIO
STESSO GIOCATORE
NELLO STESSO TORNEO
*/


const {

data:giaIscritto

}

=

await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
torneoId
)

.eq(
"nome_completo",
nomeCompleto
);







if(
giaIscritto &&
giaIscritto.length>0
){


mostraMessaggio(

"⚠️ Giocatore già iscritto"

,
"errore"

);


return;


}









/*
SALVATAGGIO
*/


const {

error

}

=

await sb

.from("iscrizioni")

.insert({

torneo_id:
torneoId,


nome_giocatore:
alias,


nome_completo:
nomeCompleto,


categoria:
"Open",


data_iscrizione:
new Date()
.toISOString()

});







if(error){


console.error(
"Errore inserimento:",
error
);


mostraMessaggio(

"Errore durante iscrizione"

,
"errore"

);


return;


}









mostraMessaggio(

"✅ Iscrizione completata: "
+
alias

,
"successo"

);







caricaTornei();



}







/*
================================
MESSAGGI
================================
*/


function mostraMessaggio(
testo,
tipo
){



const box =
document.getElementById(
"messaggio"
);



box.className =
tipo;



box.innerHTML =
`

<p>

${testo}

</p>

`;





setTimeout(()=>{


box.innerHTML="";


},4000);



}



    /*
================================
AVVIO PAGINA
================================
*/


caricaTornei();



</script>


</body>

</html>
