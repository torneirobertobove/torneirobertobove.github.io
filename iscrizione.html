<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iscrizione Torneo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
padding:20px;
}

.card{
background:#111827;
border:1px solid #243041;
border-radius:12px;
padding:20px;
max-width:500px;
margin:auto;
}

h2{
text-align:center;
color:#10b981;
}

.info{
margin:10px 0;
}

input{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
border-radius:8px;
border:0;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:0;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-size:16px;
}

.back{
background:#475569;
}

.successo{
color:#22c55e;
text-align:center;
}

.errore{
color:#ef4444;
text-align:center;
}

</style>

</head>

<body>


<div class="card">


<h2>
🏆 Iscrizione torneo
</h2>


<div id="infoTorneo">

Caricamento torneo...

</div>


<input id="nome" placeholder="Nome">


<input id="cognome" placeholder="Cognome">


<button onclick="confermaIscrizione()">

Conferma iscrizione

</button>


<button class="back" onclick="tornaIndietro()">

Torna ai tornei

</button>


<div id="messaggio"></div>


</div>


<script>
 // BLOCCO 2/8

const sb = supabase.createClient(

"https://iybjvtmfaupgthqqsngd.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI"

);



const params = new URLSearchParams(
window.location.search
);



const torneoId = params.get("torneo");



let torneoCorrente=null;



let massimoGiocatori=0;



console.log(
"TORNEO SELEZIONATO:",
torneoId
);





async function caricaTorneo(){



const box=document.getElementById(
"infoTorneo"
);




if(!torneoId){


box.innerHTML=
`
<p class="errore">

Torneo non selezionato

</p>
`;

return;

}




const {

data:torneo,

error

}

=

await sb

.from("tornei")

.select(

"id,nome,data,configurazione,posti"

)

.eq(

"id",

torneoId

)

.single();







if(error || !torneo){


console.error(
"Errore caricamento torneo:",
error
);


box.innerHTML=
`
<p class="errore">

Errore caricamento torneo

</p>
`;

return;

}







torneoCorrente=torneo;





let squadre=8;





if(

torneo.configurazione &&

torneo.configurazione.rules &&

torneo.configurazione.rules.numeroSquadre

){


squadre=

Number(

torneo.configurazione.rules.numeroSquadre

);


}

else if(torneo.posti){


squadre=

Number(torneo.posti);


}





massimoGiocatori=

squadre*2;





const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(

"torneo_id",

torneoId

);





const numeroIscritti=

iscritti ?

iscritti.length :

0;





box.innerHTML=

`

<div class="info">

🏆 <b>${torneo.nome}</b>

</div>


<div class="info">

📅 Data: ${torneo.data}

</div>


<div class="info">

🎾 Formato: ${squadre} squadre

(${massimoGiocatori} giocatori max)

</div>


<div class="info">

👥 Iscritti:

${numeroIscritti}/${massimoGiocatori}

</div>


`;



}
 // BLOCCO 3/8


async function confermaIscrizione(){



const nome=document

.getElementById("nome")

.value

.trim();



const cognome=document

.getElementById("cognome")

.value

.trim();





if(!nome || !cognome){


mostraMessaggio(

"Inserire nome e cognome",

"errore"

);


return;


}




if(!torneoCorrente){


mostraMessaggio(

"Torneo non caricato",

"errore"

);


return;


}







const nomeCompleto=

nome+" "+cognome;







const alias=

cognome

.substring(0,6)

.toUpperCase();







const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(

"torneo_id",

torneoId

);







if(

iscritti &&

iscritti.length >= massimoGiocatori

){


mostraMessaggio(

"❌ Torneo completo",

"errore"

);


return;


}








const {

data:giaPresente

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(

"torneo_id",

torneoId

)

.ilike(

"nome_completo",

nomeCompleto

);







if(

giaPresente &&

giaPresente.length>0

){


mostraMessaggio(

"⚠️ Giocatore già iscritto",

"errore"

);


return;


}







const {

error

}

=

await sb

.from("iscrizioni")

.insert({


torneo_id:

torneoId,



nome_giocatore:

alias,



nome_completo:

nomeCompleto,



categoria:

"Open",



data_iscrizione:

new Date()

.toISOString()



});







if(error){


console.error(

"Errore salvataggio iscrizione:",

error

);



mostraMessaggio(

"Errore durante iscrizione",

"errore"

);


return;


}







mostraMessaggio(

"✅ Iscrizione effettuata: "+alias,

"successo"

);







setTimeout(()=>{


window.location.href=

"visitatore.html";


},1500);





}
// BLOCCO 4/8


function mostraMessaggio(testo,tipo){


const box=document.getElementById(
"messaggio"
);



box.className=tipo;



box.innerHTML=

`

<p>

${testo}

</p>

`;



setTimeout(()=>{


box.innerHTML="";

box.className="";


},4000);



}






function tornaIndietro(){


window.location.href=

"visitatore.html";


}





async function aggiornaContatore(){



if(!torneoId){

return;

}




const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(

"torneo_id",

torneoId

);




if(!torneoCorrente){

return;

}




const box=document.getElementById(
"infoTorneo"
);



if(!box){

return;

}




const numeroIscritti=

iscritti ?

iscritti.length :

0;




let squadre=8;




if(

torneoCorrente.configurazione &&

torneoCorrente.configurazione.rules &&

torneoCorrente.configurazione.rules.numeroSquadre

){


squadre=

Number(

torneoCorrente.configurazione.rules.numeroSquadre

);


}






massimoGiocatori=squadre*2;





box.innerHTML+=

`

<div class="info">

👥 Aggiornamento:

${numeroIscritti}/${massimoGiocatori}

giocatori

</div>

`;



}
 // BLOCCO 5/8


async function controllaUtente(){


const {

data:{
user

}

}

=

await sb.auth.getUser();





if(!user){


console.log(

"Utente non autenticato"

);


}





}




async function controlloFinalePosti(){



const {

data:torneo

}

=

await sb

.from("tornei")

.select(

"posti,configurazione"

)

.eq(

"id",

torneoId

)

.single();







if(!torneo){

return false;

}






let squadre=8;





if(

torneo.configurazione &&

torneo.configurazione.rules &&

torneo.configurazione.rules.numeroSquadre

){


squadre=

Number(

torneo.configurazione.rules.numeroSquadre

);


}

else if(torneo.posti){


squadre=

Number(torneo.posti);


}





const limite=squadre*2;






const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(

"torneo_id",

torneoId

);






return (

iscritti &&

iscritti.length>=limite

);



}







async function verificaPrimaDiIscrivere(){



const completo=

await controlloFinalePosti();





if(completo){


mostraMessaggio(

"❌ Il torneo è completo",

"errore"

);


return false;


}




return true;



}


// BLOCCO 6/8


async function inizializzaPagina(){



await controllaUtente();



await caricaTorneo();



await aggiornaContatore();



}




window.addEventListener(

"load",

()=>{

inizializzaPagina();

}

);
 // BLOCCO 7/8


// Protezione doppio click sul pulsante iscrizione

let invioInCorso=false;



const confermaBase=confermaIscrizione;



confermaIscrizione=async function(){



if(invioInCorso){

return;

}



invioInCorso=true;



try{



const ok=

await verificaPrimaDiIscrivere();



if(!ok){

return;

}



await confermaBase();



}



catch(e){



console.error(

"Errore iscrizione:",

e

);



mostraMessaggio(

"Errore inatteso durante iscrizione",

"errore"

);



}



finally{



invioInCorso=false;



}



};


// BLOCCO 8/8


</script>


</body>

</html>
