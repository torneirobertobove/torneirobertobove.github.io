<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Iscrizione Tornei</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 8px #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:0;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0 10px;
    box-sizing:border-box;
}

.info{
    margin:8px 0;
    color:#555;
}

.errore{
    color:red;
    text-align:center;
}

.lista{
    background:#f9fafb;
    padding:10px;
    border-radius:8px;
}

</style>

</head>


<body>


<div class="container">


<h1>
🏆 Tornei disponibili
</h1>


<div id="errore" class="errore"></div>


<div id="listaTornei">
Caricamento...
</div>


</div>



<script>


const sb =
supabase.createClient(

'https://iybjvtmfaupgthqqsngd.supabase.co',

'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI'

);





async function caricaTornei(){


const box =
document.getElementById("listaTornei");



const {data,error}=

await sb
.from("tornei")
.select(
"id,nome,data,posti"
)
.eq(
"pubblicato",
true
)
.order(
"data",
{
ascending:true
}
);



if(error){

box.innerHTML="Errore caricamento tornei";

return;

}



box.innerHTML="";



for(const torneo of data){



const {data:iscritti}=

await sb
.from("iscrizioni")
.select(
"nome_giocatore,nome_completo"
)
.eq(
"torneo_id",
torneo.id
);



const totalePosti =
(Number(torneo.posti)||0)*2;


const numeroIscritti =
iscritti ? iscritti.length : 0;



const chiuso =
totalePosti > 0 &&
numeroIscritti >= totalePosti;




let elenco="";



if(iscritti && iscritti.length){


iscritti.forEach((g,i)=>{


elenco +=
`
<div>
${i+1}. ${g.nome_giocatore}
</div>
`;


});


}else{


elenco =
"Nessun iscritto";


}





box.innerHTML += `


<div class="card">


<h2>
🏆 ${torneo.nome}
</h2>


<div class="info">
📅 ${torneo.data}
</div>


<div class="info">
🎾 Formato: ${torneo.posti} squadre
</div>


<div class="info">

👥 Iscritti:
${numeroIscritti}/${totalePosti} giocatori

</div>


<div class="lista">

<b>
Lista iscritti:
</b>

<br><br>

${elenco}

</div>



<br>


<div class="info">

${
chiuso
?
"❌ TORNEO CHIUSO - POSTI ESAURITI"
:
"🟢 Posti disponibili: "+(totalePosti-numeroIscritti)+" giocatori"
}


</div>



<button

onclick="iscriviti(${torneo.id})"

${chiuso ? "disabled":""}

>

${chiuso ? "CHIUSO":"Iscriviti"}

</button>


</div>


`;



}



}








async function iscriviti(id){



let nome =
prompt(
"Inserisci nome:"
);



if(!nome)return;




let cognome =
prompt(
"Inserisci cognome:"
);



if(!cognome)return;




let alias =

cognome

.substring(0,6)

.toUpperCase();






const {

data:gia

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(
"torneo_id",
id
)

.eq(
"nome_completo",
nome+" "+cognome
);






if(gia && gia.length){


alert(
"Sei già iscritto a questo torneo"
);


return;


}







const {

data:torneo

}

=

await sb

.from("tornei")

.select("posti")

.eq(
"id",
id
)

.single();







const {

data:iscritti

}

=

await sb

.from("iscrizioni")

.select("id")

.eq(
"torneo_id",
id
);






const limite =
(Number(torneo.posti)||0)*2;





if(
limite &&
iscritti.length>=limite
){


alert(
"Torneo chiuso: posti esauriti"
);


return;


}







const {error}=

await sb

.from("iscrizioni")

.insert({

torneo_id:id,

nome_giocatore:alias,

nome_completo:
nome+" "+cognome,

categoria:"Open",

data_iscrizione:
new Date()
.toISOString()

});






if(error){


console.error(error);


alert(
"Errore iscrizione"
);


return;


}



alert(
"Iscrizione completata!"
);



caricaTornei();



}






caricaTornei();



</script>


</body>

</html>
