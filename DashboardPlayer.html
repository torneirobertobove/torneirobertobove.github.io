<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Player</title>
<style>
:root{--bg:#0f172a;--card:#111827;--text:#e5e7eb;--accent:#6366f1;}
body{background:var(--bg);color:var(--text);font-family:system-ui;margin:0;padding:20px}
.container{max-width:800px;margin:0 auto}
.card{background:var(--card);padding:20px;border-radius:12px;border:1px solid #243041;margin-bottom:20px}
.btn-back{background:#475569;color:#fff;padding:10px 20px;border-radius:8px;border:0;cursor:pointer;margin-bottom:20px}
h2{margin-top:0;color:var(--accent)}
.news-item{border-bottom:1px solid #243041;padding:10px 0}
.calendar-item{display:flex;justify-content:space-between;align-items:center;background:#0b1220;padding:10px;margin:5px 0;border-radius:6px}
</style>
</head>
<body>

<div class="container">
    <button class="btn-back" onclick="location.href='2Pages.html'">⬅ Indietro</button>

    <!-- Area News -->
    <div class="card">
        <h2>📰 News & Mercatino</h2>
        <div class="news-item">Prossima apertura mercatino racchette usate.</div>
        <div class="news-item">Aggiornamento regolamento tornei estate 2026.</div>
    </div>

    <!-- Area Calendario -->
    <div class="card">
        <h2>📅 Calendario Tornei</h2>
        <div id="calendarioList">
            <div class="calendar-item">
                <span>Torneo Padel Gold - 20 Luglio</span>
                <button onclick="alert('Iscrizione inviata!')" style="background:var(--accent);border:0;color:white;padding:5px 10px;border-radius:4px;cursor:pointer;">Iscriviti</button>
            </div>
        </div>
        <!-- Bottone nuova funzionalità richiesto -->
        <button onclick="alert('In lavorazione...')" style="width:100%; margin-top:15px; padding:10px; background:#374151; border:0; color:white; border-radius:6px; cursor:pointer;">Nuova Funzionalità</button>
    </div>
</div>

</body>
</html>
