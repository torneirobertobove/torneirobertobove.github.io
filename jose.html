<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Torneo 8 Squadre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f172a;--card:#111827;--line:#243041;--text:#e5e7eb;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(160deg,#0b1020,#111827);color:var(--text);padding-bottom:50px}
.container{max-width:1000px;margin:0 auto;padding:10px}
.header-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;margin-bottom:20px}
@media(min-width:600px){.header-box{flex-direction:row;gap:30px;}}
.date-input-field{background:#0b1220; border:1px solid #334155; color:#fff; padding:2px 5px; border-radius:4px; font-family:system-ui; font-size:0.9rem; cursor:pointer; width:110px; text-align:center;}
.topbar{display:flex;justify-content:center;gap:20px;margin-bottom:15px;flex-wrap:wrap;}
.btn-group{display:flex;gap:4px;}
button{padding:8px 12px;border-radius:8px;border:0;cursor:pointer;background:#2563eb;color:#fff;font-size:14px;font-family:system-ui;}
button.reset{background:#dc2626}
button.back{background:#475569}
.modal{display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); padding:20px;}
.modal-content{background:#111827; margin:auto; padding:20px; max-width:500px; border-radius:12px; border:1px solid #243041; color:#e5e7eb; overflow-y:auto; max-height:90vh;}
textarea{width:100%; height:150px; background:#0b1220; color:#fff; border:1px solid #334155; padding:10px; margin-top:10px; border-radius:4px;font-family:system-ui;}
.groups{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:600px){.groups{grid-template-columns:1fr 1fr;}}
.card{background:#111827;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:15px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
th,td{padding:8px 4px;border-bottom:1px solid #1f2a3c;text-align:center;}
input{width:100%;padding:5px;border-radius:4px;background:#0b1220;border:1px solid #334155;color:#fff;text-align:center;font-family:system-ui;}
.db-cell{display:flex; gap:2px;}
.db-cell input{width:50%;}
.ko{margin-top:10px;display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:600px){.ko{grid-template-columns:1fr 1fr;}}
.koBox{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px;}
.finalContainer{border:2px solid #eab308;padding:15px;margin-top:20px;border-radius:15px;background:#1e293b;}
.qual-arrow-up{color:#22c55e;font-weight:bold;font-size:16px;display:inline-block;min-width:16px;}
.qual-arrow-down{color:#ef4444;font-weight:bold;font-size:16px;display:inline-block;min-width:16px;}
</style>
</head>
<body onload="initDefaults()">
    <div id="teamModal" class="modal"><div class="modal-content"><h3>Inserisci Squadre</h3><textarea id="teamInput"></textarea><button onclick="saveTeams()" style="width:100%; margin-top:10px;">💾 Salva Squadre</button><button class="back" onclick="document.getElementById('teamModal').style.display='none'" style="width:100%; margin-top:5px;">Chiudi</button></div></div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ Regolamento</h3>
        
        <label>Criterio Classifica:</label>
        <select id="crit1" style="width:100%; padding:8px; margin-bottom:10px; background:#0b1220; color:#fff; border:1px solid #334155;">
            <option value="df">Differenza Giochi</option>
            <option value="gf">Maggiori Giochi Vinti</option>
            <option value="gs">Minor Giochi Persi</option>
        </select>

        <div><label>Punti Vittoria</label><input id="wP" type="number" value="3"></div>
        <div style="margin-top:10px;"><label>Punti Pareggio</label><input id="dP" type="number" value="1"></div>
        <div style="margin-top:10px;"><label>Durata Match (min)</label><input id="matchDuration" type="number" value="30"></div>
        <div style="margin-top:10px;"><label>Start ore</label><input id="startTime" type="time" value="20:00"></div>
        
        <div style="margin-top:15px; padding:10px; background:#1e293b; border-radius:8px;">
            <label style="cursor:pointer;">
                <input type="checkbox" id="showQuarti" checked> Abilita Fase Finale (Quarti/Semifinali)
            </label>
        </div>

        <button onclick="applyRules()" style="width:100%; margin-top:15px; background:#2563eb; padding:10px; border-radius:8px; border:none; color:#fff; cursor:pointer;">💾 Salva Regole</button>
    </div>
</div>
<div id="formatModal" class="modal"><div class="modal-content"><h3>Seleziona Formato</h3>
    <button onclick="setFormat(8)" style="width:100%; margin:5px 0;">8 Squadre</button>
    <button onclick="setFormat(12)" style="width:100%; margin:5px 0;">12 Squadre</button>
    <button onclick="setFormat(16)" style="width:100%; margin:5px 0;">16 Squadre</button>
</div></div>
<div class="container">
 <div class="header-box">
    <div style="text-align: center;"><div class="subtitle">Roberto Bove<br>Director & Event Organizer</div></div>
    <div style="text-align: center;">
      <h1 style="margin:0;font-size:1.4rem;">🏆 Torneo</h1>
      <input type="text" id="nomeTorneoInput" placeholder="Nome Torneo" onblur="state.nomeTorneo=this.value" class="date-input-field" style="width:200px; margin: 10px auto 0; display:block;">
    </div>
 </div>

 <div class="topbar">
    <div class="btn-group">
      <button onclick="document.getElementById('formatModal').style.display='block'">⚙️ Formato</button>
      <button onclick="document.getElementById('file').click()">Import Excel</button>
      <input type="file" id="file" hidden onchange="handleFile(event)">
      <button onclick="openRules()">📖 Regole</button>
      <button onclick="updateAndSync()">💾 Salva</button>
    </div>
    <div class="btn-group"><button onclick="document.getElementById('teamModal').style.display='block'">📝 Squadre</button></div>
    <div class="btn-group"><button class="reset" onclick="reset()">Reset</button><button onclick="window.print()">Stampa</button></div>
 </div>
 <div class="groups">
    <div class="card" id="cardA"><table id="A"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Arows"></tbody></table><table style="margin-top:20px;"><thead><tr><th>Girone A</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Aclass"></tbody></table></div>
    <div class="card" id="cardB"><table id="B"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Brows"></tbody></table><table style="margin-top:20px;"><thead><tr><th>Girone B</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Bclass"></tbody></table></div>
    <div class="card" id="cardC" style="display:none;"><table id="C"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Crows"></tbody></table><table style="margin-top:20px;"><thead><tr><th>Girone C</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Cclass"></tbody></table></div>
    <div class="card" id="cardD" style="display:none;"><table id="D"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Drows"></tbody></table><table style="margin-top:20px;"><thead><tr><th>Girone D</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Dclass"></tbody></table></div>
 </div>
 <div class="finalContainer">
    <h2 style="text-align:center;margin-top:0;">Fase Finale</h2>
    <div class="ko"><div class="koBox"><h3 style="text-align:center;">QUARTI</h3><div id="Q"></div></div><div class="koBox"><h3 style="text-align:center;">SEMIFINALI</h3><div id="S"></div></div></div>
 </div>
</div>
<script>
<script>
const sb = supabase.createClient('https://iybjvtmfaupgthqqsngd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY2NzE4NSwiZXhwIjoyMDk4MjQzMTg1fQ.HNCXcSpzjfXxjsIhhEODJIkVkZwIcUmXBu1Cgxy7ID0');

let state = {
    nomeTorneo:"Torneo 8 Squadre", rules:{w:3,d:1,crit1:'df',start:"20:00",duration:30, showQuarti:true},
    A:[], B:[], C:[], D:[],
    Ares:Array(6).fill("-"), Bres:Array(6).fill("-"), Cres:Array(6).fill("-"), Dres:Array(6).fill("-"),
    Atime:Array(6).fill("-"), Btime:Array(6).fill("-"), Ctime:Array(6).fill("-"), Dtime:Array(6).fill("-")
};

function ensureRules(){ if(!state.rules) state.rules = {w:3,d:1,crit1:'df',start:"20:00",duration:30, showQuarti:true}; }

function openRules(){ 
    ensureRules(); 
    document.getElementById("rulesModal").style.display="block"; 
    document.getElementById("wP").value=state.rules.w; 
    document.getElementById("dP").value=state.rules.d; 
    document.getElementById("crit1").value=state.rules.crit1; 
    document.getElementById("startTime").value=state.rules.start; 
    document.getElementById("matchDuration").value=state.rules.duration; 
    document.getElementById("showQuarti").checked = state.rules.showQuarti;
}

function applyRules(){ 
    state.rules.w = Number(document.getElementById("wP").value); 
    state.rules.d = Number(document.getElementById("dP").value); 
    state.rules.crit1 = document.getElementById("crit1").value; 
    state.rules.start = document.getElementById("startTime").value; 
    state.rules.duration = Number(document.getElementById("matchDuration").value); 
    state.rules.showQuarti = document.getElementById("showQuarti").checked;
    document.getElementById("rulesModal").style.display="none"; 
    updateAndSync(); 
}

function calc(teams,res){ 
    ensureRules(); 
    let matches=[[0,1],[2,3],[0,3],[1,2],[0,2],[1,3]]; 
    let t=teams.map((n,idx)=>({n,pt:0,gf:0,gs:0,df:0})); 
    matches.forEach((m,i)=>{ 
        let r=(res[i]||"-").split("-"); 
        let a=r[0], b=r[1]; 
        // RIGOROSO: Conta punti solo se ci sono numeri validi
        if(a !== "" && a !== "-" && b !== "" && b !== "-" && !isNaN(a) && !isNaN(b)){
            let valA=Number(a), valB=Number(b);
            t[m[0]].gf+=valA; t[m[0]].gs+=valB; 
            t[m[1]].gf+=valB; t[m[1]].gs+=valA;
            if(valA>valB) t[m[0]].pt+=state.rules.w; 
            else if(valB>valA) t[m[1]].pt+=state.rules.w; 
            else { t[m[0]].pt+=state.rules.d; t[m[1]].pt+=state.rules.d; } 
        } 
    }); 
    t.forEach(x=>x.df=x.gf-x.gs); 
    let c=state.rules.crit1; 
    return t.sort((a,b)=>{ if(b.pt!=a.pt) return b.pt-a.pt; if(c=='df') return b.df-a.df; if(c=='gf') return b.gf-a.gf; return a.gs-b.gs; }); 
}

function updateRes(g,i,pos,val){ 
    let s=(g==='A'?state.Ares:g==='B'?state.Bres:g==='C'?state.Cres:state.Dres); 
    let p=s[i].split('-'); p[pos]=val; s[i]=p.join('-'); updateAndSync(); 
}

function updateTime(g,i,pos,val){ 
    let s=(g==='A'?state.Atime:g==='B'?state.Btime:g==='C'?state.Ctime:state.Dtime); 
    let p=s[i].split('-'); p[pos]=val; s[i]=p.join('-'); updateAndSync(); 
}

function renderTables(){ 
    ['A','B','C','D'].forEach(tag=>{ 
        if((tag==='C'||tag==='D') && state[tag].length===0) return; 
        let rows="", list=state[tag], res=state[tag+'res'], time=state[tag+'time'], matches=[[0,1],[2,3],[0,3],[1,2],[0,2],[1,3]]; 
        matches.forEach((m,i)=>{ 
            let t=(time[i]||"-").split("-"), r=(res[i]||"-").split("-"); 
            rows+=`<tr><td>${i+1}</td><td><div class="db-cell"><input value="${t[0]||''}" oninput="updateTime('${tag}',${i},0,this.value)"><input value="${t[1]||''}" oninput="updateTime('${tag}',${i},1,this.value)"></div></td><td>${list[m[0]]||'-'}/${list[m[1]]||'-'}</td><td><div class="db-cell"><input value="${r[0]||''}" oninput="updateRes('${tag}',${i},0,this.value)"><input value="${r[1]||''}" oninput="updateRes('${tag}',${i},1,this.value)"></div></td></tr>`; 
        }); 
        document.getElementById(tag+"rows").innerHTML=rows; 
    }); 
}

function renderClass(){ 
    ['A','B','C','D'].forEach(tag=>{ 
        if((tag==='C'||tag==='D') && state[tag].length===0) return; 
        let d=calc(state[tag], state[tag+'res']); 
        document.getElementById(tag+"class").innerHTML=d.map(x=>`<tr><td>${x.n}</td><td>${x.pt}</td><td>${x.gf}</td><td>${x.gs}</td><td>${x.df}</td></tr>`).join(""); 
    }); 
}

async function updateAndSync(){ 
    await sb.from('torneo').upsert({id:'torneo_data', state:state}); 
    render(); 
}

function render(){ 
    document.getElementById("nomeTorneoInput").value = state.nomeTorneo;
    document.querySelector('.finalContainer').style.display = state.rules.showQuarti ? 'block' : 'none';
    renderTables(); 
    renderClass(); 
}

function saveNome(){ state.nomeTorneo = document.getElementById("nomeTorneoInput").value; updateAndSync(); }
function saveTeams(){ let input=document.getElementById('teamInput').value, t=input.split('\n').filter(Boolean); state.A=t.slice(0,4); state.B=t.slice(4,8); state.C=t.slice(8,12); state.D=t.slice(12,16); document.getElementById('teamModal').style.display='none'; updateAndSync(); }
function initDefaults(){ render(); }
function reset(){ location.reload(); }
function handleFile(e){ let r=new FileReader(); r.onload=function(evt){ let wb=XLSX.read(new Uint8Array(evt.target.result), {type:"array"}), data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1}).flat().filter(Boolean); state.A=data.slice(0,4); state.B=data.slice(4,8); state.C=data.slice(8,12); state.D=data.slice(12,16); updateAndSync(); }; r.readAsArrayBuffer(e.target.files[0]); }
</script>
