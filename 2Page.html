<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Principale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0f172a; color:#fff; font-family:system-ui; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .card { background:#111827; padding:30px; border-radius:15px; border:1px solid #243041; text-align:center; width:90%; max-width:400px; }
        button { width:100%; padding:15px; margin:10px 0; border:0; border-radius:8px; cursor:pointer; font-weight:bold; font-size:16px; transition: 0.3s; }
        .admin-btn { background:#2563eb; color:#fff; }
        .user-btn { background:#10b981; color:#fff; }
        .logout { background:#ef4444; color:#fff; margin-top:20px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="welcome">Verifica in corso...</h2>
        
        <!-- Bottone Admin: punta a Bove.html -->
        <div id="adminMenu" style="display:none">
            <button class="admin-btn" onclick="location.href='Bove.html'">⚙️ Gestione Torneo</button>
        </div>
        
        <!-- Bottone Utente: deve puntare alla pagina che useranno i visitatori -->
        <div id="userMenu" style="display:none">
            <button class="user-btn" onclick="location.href='visitatore.html'">🏆 Visualizza Tornei</button>
        </div>

        <button class="logout" onclick="logout()">Esci</button>
    </div>

    <script>
        const sb = supabase.createClient("https://iybjvtmfaupgthqqsngd.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI");
        
        // Elenco email autorizzate come Admin
        const admins = ["giose.rizzi@gmail.com", "dott.robertobove@gmail.com"];

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            
            if (!session) { 
                location.href = "index.html"; 
                return; 
            }
            
            const userEmail = session.user.email.toLowerCase();
            document.getElementById('welcome').innerText = "Benvenuto, " + session.user.email;
            
            // Logica di smistamento
            if (admins.includes(userEmail)) {
                document.getElementById('adminMenu').style.display = 'block';
            } else {
                document.getElementById('userMenu').style.display = 'block';
            }
        }

        async function logout() { 
            await sb.auth.signOut(); 
            location.href = "index.html"; 
        }

        init();
    </script>
</body>
</html>
