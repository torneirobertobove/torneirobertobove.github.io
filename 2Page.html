
<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Principale</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body {
    background:#0f172a;
    color:#fff;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}


.card {
    background:#111827;
    padding:30px;
    border-radius:15px;
    border:1px solid #243041;
    text-align:center;
    width:90%;
    max-width:400px;
}


button {
    width:100%;
    padding:15px;
    margin:10px 0;
    border:0;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    transition:0.3s;
}


.admin-btn {
    background:#2563eb;
    color:#fff;
}


.user-btn {
    background:#10b981;
    color:#fff;
}


.logout {
    background:#ef4444;
    color:#fff;
    margin-top:20px;
}


button:hover {
    opacity:0.8;
}


</style>


</head>


<body>
