<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Torneo Scalabile</title>

<style>
:root{--bg:#0f172a;--card:#111827;--line:#243041;--text:#e5e7eb;}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(160deg,#0b1020,#111827);
  color:var(--text);
  padding-bottom:50px;
}
.container{max-width:1000px;margin:0 auto;padding:10px}

.header-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}
@media(min-width:600px){
  .header-box{flex-direction:row;gap:30px;}
}

.subtitle{font-size:0.7rem;color:#94a3b8;text-align:center}

.date-input-field{
  background:#0b1220;
  border:1px solid #334155;
  color:#fff;
  padding:5px;
  border-radius:4px;
  width:110px;
  text-align:center;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.btn-group{display:flex;gap:6px}

button{
  padding:8px 12px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
}

button.reset{background:#dc2626}

select{
  padding:8px;
  border-radius:8px;
  background:#0b1220;
  color:#fff;
  border:1px solid #334155;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  padding:20px;
}

.modal-content{
  background:#111827;
  max-width:500px;
  margin:auto;
  padding:20px;
  border-radius:12px;
  border:1px solid #243041;
}

.groups{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
@media(min-width:600px){
  .groups{grid-template-columns:1fr 1fr;}
}

.card{
  background:#111827;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #1f2a3c;
  text-align:center;
}

.ko{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.koBox{
  background:#0b1220;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header-box">
  <div>
    <img src="logo.jpg" style="width:60px;height:60px;border-radius:50%">
    <div class="subtitle">Director & Event Organizer</div>
  </div>

  <div style="text-align:center">
    <h2>🏆 Torneo Dinamico</h2>
    <input class="date-input-field" placeholder="Nome Torneo">

    <div style="margin-top:10px">
      <select id="tipoTorneo" onchange="renderLayout()">
        <option value="8">8 Squadre</option>
        <option value="12">12 Squadre</option>
        <option value="16">16 Squadre</option>
      </select>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="btn-group">
    <button>Import Excel</button>
    <button>Regole</button>
  </div>
  <div class="btn-group">
    <button>Squadre</button>
  </div>
  <div class="btn-group">
    <button class="reset">Reset</button>
    <button>Salva</button>
  </div>
</div>

<!-- GIRONI DINAMICI -->
<div id="groups" class="groups"></div>

<!-- KO AREA DINAMICA -->
<div class="ko">

  <div class="koBox" id="quartif">
    <h3>🏁 Quarti</h3>
    <div>Area Quarti</div>
  </div>

  <div class="koBox" id="semif">
    <h3>🔥 Semifinali</h3>
    <div>Area Semifinali</div>
  </div>

</div>

<!-- FINALE -->
<div class="koBox" style="margin-top:15px">
  <h3>🏆 Finale</h3>
  <div>Area Finale</div>
</div>

</div>

<script>
const config = {
  8:  { gironi: 2, quarti:false },
  12: { gironi: 3, quarti:true },
  16: { gironi: 4, quarti:true }
};

function createGroup(name){
  return `
    <div class="card">
      <h3>Girone ${name}</h3>
      <table>
        <tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr>
        <tr><td>-</td><td>-</td><td>Placeholder</td><td>-</td></tr>
      </table>
    </div>
  `;
}

function renderLayout(){
  const type = document.getElementById("tipoTorneo").value;
  const cfg = config[type];

  const letters = ["A","B","C","D"];

  let html = "";
  for(let i=0;i<cfg.gironi;i++){
    html += createGroup(letters[i]);
  }

  document.getElementById("groups").innerHTML = html;

  // KO VISIBILITY
  document.getElementById("quartif").style.display = cfg.quarti ? "block" : "none";
}

renderLayout();
</script>

</body>
</html>
