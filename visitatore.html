<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tornei Disponibili</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body {
    background:#0f172a;
    color:#fff;
    font-family:system-ui;
    padding:20px;
}


.card {
    background:#111827;
    padding:20px;
    border-radius:15px;
    border:1px solid #243041;
    max-width:600px;
    margin:auto;
}


h2 {
    text-align:center;
    color:#10b981;
}


.torneo-item {

    background:#1f2937;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;

}


.btn-iscriviti {

    background:#10b981;
    color:#fff;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;

}


.back-btn {

    background:#475569;
    color:#fff;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    margin-top:20px;
    cursor:pointer;

}


</style>


</head>



<body>


<div class="card">


<h2>
Tornei Disponibili
</h2>



<div id="lista-tornei">

<p>
Caricamento tornei...
</p>

</div>




<button 
class="back-btn"
onclick="location.href='2Page.html'">

Torna alla Dashboard

</button>



</div>







<script>


const sb = supabase.createClient(

"https://iybjvtmfaupgthqqsngd.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI"

);






async function caricaTornei(){



const box =
document.getElementById(
"lista-tornei"
);




const {

data,
error

}

=
await sb

.from("tornei")

.select(
"id,nome,data,posti"
)

.eq(
"pubblicato",
true
)

.order(
"data",
{
ascending:true
}
);






if(error){


console.error(
"Errore caricamento tornei:",
error
);


box.innerHTML =
"<p>Errore caricamento tornei</p>";


return;


}






if(!data || data.length===0){


box.innerHTML =
"<p>Nessun torneo disponibile</p>";


return;


}






box.innerHTML="";






data.forEach(t=>{



box.innerHTML += `


<div class="torneo-item">


<div>

<b>
🏆 ${t.nome}
</b>

<br>

📅 ${t.data}

<br>

👥 Posti:
${t.posti ?? "liberi"}

</div>



<button
class="btn-iscriviti"
onclick="iscriviti(${t.id})">

Iscriviti

</button>


</div>


`;



});



}







function iscriviti(id){


alert(
"Torneo selezionato: "
+
id
);


}






caricaTornei();





</script>


</body>

</html>
