async function caricaTornei(){

const box=document.getElementById("lista-tornei");

const {data,error}=await sb
.from("tornei")
.select("id,nome,data,posti,configurazione,pubblicato")
.eq("pubblicato",true)
.order("data",{ascending:true});


if(error){

console.error("Errore caricamento tornei:",error);

box.innerHTML=
`
<p style="color:#ef4444;text-align:center">
Errore caricamento tornei<br>
${error.message}
</p>
`;

return;

}


if(!data || data.length===0){

box.innerHTML=
`
<p>
Nessun torneo disponibile
</p>
`;

return;

}


box.innerHTML="";


for(const torneo of data){

await creaSchedaTorneo(torneo);

}


}

// BLOCCO 2/4

async function creaSchedaTorneo(torneo){


const box=document.getElementById("lista-tornei");



let configurazione=torneo.configurazione || {};



let numeroSquadre=0;



if(configurazione.rules && configurazione.rules.numeroSquadre){

numeroSquadre=Number(configurazione.rules.numeroSquadre);

}

else if(configurazione.numeroSquadre){

numeroSquadre=Number(configurazione.numeroSquadre);

}

else if(configurazione.formato){

numeroSquadre=Number(configurazione.formato);

}



if(!numeroSquadre){

numeroSquadre=8;

}



const massimoGiocatori=numeroSquadre*2;



const {data:iscritti}=await sb

.from("iscrizioni")

.select("id,nome_completo,nome_giocatore")

.eq("torneo_id",torneo.id)

.order("id",{ascending:true});





const numeroIscritti=iscritti ? iscritti.length : 0;



const disponibili=massimoGiocatori-numeroIscritti;



const chiuso=numeroIscritti>=massimoGiocatori;



let listaIscritti="";



if(iscritti && iscritti.length){


iscritti.forEach((g,i)=>{


listaIscritti+=`

<div>

${i+1}) ${g.nome_completo || g.nome_giocatore}

</div>

`;


});


}
else{


listaIscritti="<div>Nessun giocatore iscritto</div>";


}



let squadre="";



for(let i=0;i<iscritti.length;i+=2){


if(iscritti[i+1]){


squadre+=`

<div class="squadra">

🎾 Squadra ${i/2+1}

<br>

${iscritti[i].nome_completo}

<br>

+

<br>

${iscritti[i+1].nome_completo}

</div>

`;


}


}




box.innerHTML+=`


<div class="torneo-item">


<h3>

🏆 ${torneo.nome}

</h3>


<div>

📅 ${torneo.data}

</div>


<div>

🎾 Formato:
${numeroSquadre} squadre

</div>



<div>

👥 Iscritti:
${numeroIscritti}/${massimoGiocatori} giocatori

</div>



<div>

${
chiuso

?

"❌ ISCRIZIONI CHIUSE"

:

"✅ Posti disponibili: "+disponibili+" giocatori"

}

</div>




<button

class="btn-iscriviti"

onclick="vaiIscrizione(${torneo.id})"

${chiuso ? "disabled":""}

>

${chiuso ? "Chiuso":"Iscriviti"}

</button>



<div class="lista">

<h4>

👥 Lista iscritti

</h4>

${listaIscritti}

</div>




<div class="lista">

<h4>

🎾 Squadre create

</h4>

${squadre || "In attesa della prima coppia"}

</div>



</div>


`;


}



function vaiIscrizione(id){


window.location.href=

"iscrizione.html?torneo="+id;


}

if(box){

box.innerHTML="";

}


}

try{


await verificaLogin();


await caricaTornei();

catch(e){

e

);
