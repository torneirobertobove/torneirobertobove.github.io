async function caricaTornei(){


const box =
document.getElementById(
"lista-tornei"
);



const {
data,
error
}
=
await sb

.from("tornei")

.select(
"id,nome,data,posti"
)

.eq(
"pubblicato",
true
)

.order(
"data",
{
ascending:true
}
);





if(error){

console.error(
"Errore caricamento tornei:",
error
);

box.innerHTML =
"<p>Errore caricamento tornei</p>";

return;

}





if(!data || data.length===0){

box.innerHTML =
"<p>Nessun torneo disponibile</p>";

return;

}





box.innerHTML="";





for(const t of data){



const {
data:iscritti
}
=
await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
t.id
);



const numeroIscritti =
iscritti
?
iscritti.length
:
0;



const posti =
t.posti
?
t.posti
:
0;



const chiuso =
posti > 0 &&
numeroIscritti >= posti;





box.innerHTML += `


<div class="torneo-item">


<div>

<b>
🏆 ${t.nome}
</b>

<br>

📅 ${t.data}

<br>

👥 Iscritti:
${numeroIscritti}/${posti || "liberi"}

<br>

${
chiuso
?
"❌ Posti esauriti"
:
"✅ Posti disponibili: " + (posti-numeroIscritti)
}

</div>




<button

class="btn-iscriviti"

onclick="iscriviti(${t.id})"

${chiuso ? "disabled" : ""}

>

${chiuso ? "Chiuso" : "Iscriviti"}

</button>


</div>


`;



}


}








async function iscriviti(id){

alert(

id

const {
data:iscritti
}
=
await sb

.from("iscrizioni")

.select(
"id"
)

.eq(
"torneo_id",
id
);






if(
torneo.posti &&
iscritti.length >= torneo.posti
){

alert(
"❌ Torneo chiuso: posti esauriti"
);

}





const {
error
}
=
await sb
