<body>
<div class="box">
    <img src="logo.jpg" class="logo">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="buttons">
        <button class="btn" id="loginBtn">Accedi</button>
        <button class="btn" id="registerBtn">Registrati</button>
    </div>
    <div id="status"></div>
</div>

<script>
const supabaseUrl = "https://iybjvtmfaupgthqqsngd.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

// Verifica se la libreria è caricata
if (typeof supabase === 'undefined') {
    document.getElementById("status").innerText = "Errore: Libreria Supabase non caricata!";
} else {
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM caricato");

        document.getElementById("registerBtn").addEventListener("click", async () => {
            console.log("Click registrato su Registrati");
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            if(!email || !password) {
                document.getElementById("status").innerText = "Inserisci dati";
                return;
            }
            
            const { error } = await client.auth.signUp({ email, password });
            document.getElementById("status").innerText = error ? error.message : "Controlla email!";
        });
    });
}
</script>
</body>
