<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greenpark Bari</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#004a99;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:rgba(255,255,255,0.15);
    padding:25px;
    border-radius:20px;
    width:300px;
    text-align:center;
    backdrop-filter: blur(10px);
}

input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

.buttons {
    display:flex;
    gap:10px;
}

button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#status {
    margin-top:10px;
    font-size:14px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="box">

<h2>Tornei Green</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div class="buttons">
<button onclick="register()">Registrati</button>
<button onclick="login()">Accedi</button>
</div>

<div id="status"></div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://iybjvtmfaupgthqqsngd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

let supabase;

window.addEventListener("load", () => {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
});

async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({
        email,
        password
    });

    document.getElementById("status").innerText =
        error ? error.message : "Registrazione inviata!";
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    } else {
        window.location.href = "torneo_8_squadre_TOP.html";
    }
}
</script>
