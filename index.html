<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenpark Bari</title>

    <style>
        :root {
            --bg-image: url('sfondo.jpg'); 
        }

        body { 
            margin: 0; 
            background-color: #004a99;
            background-image: var(--bg-image);
            background-size: cover;       
            background-position: center;  
            background-attachment: fixed; 
            background-repeat: no-repeat;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white;
        }

        .header-title { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        .box { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            padding: 30px; 
            border-radius: 25px; 
            text-align: center; 
            width: 85%; 
            max-width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .logo { width: 150px; margin-bottom: 10px; }

        .firma { 
            font-style: italic; 
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            display: block; 
            opacity: 0.9; 
        }

        .btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            padding: 18px; 
            margin: 15px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.4); 
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .hidden {
            display: none;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header-title">Tornei Padel Green</div>

<div class="box">

    <img src="logo.jpg" alt="Logo" class="logo">

    <span class="firma">
        Roberto Bove<br>
        Director & Event Organizer
    </span>

    <!-- LOGIN -->
    <div id="loginBox">

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="btn" onclick="login()">ACCEDI</button>
        <button class="btn" onclick="register()">REGISTRATI</button>

        <p id="status"></p>
    </div>

</div>

<a href="https://torneirobertobove.github.io/" style="color:white; margin-top:30px;">
    https://torneirobertobove.github.io/
</a>

<script>
const SUPABASE_URL = "https://iybjvtmfaupgthqqsngd.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    } else {
        document.getElementById("status").innerText = "Login effettuato!";
        window.location.href = "index.html";
    }
}

async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({
        email,
        password
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    } else {
        document.getElementById("status").innerText = "Controlla la tua email!";
    }
}
</script>

</body>
</html>
