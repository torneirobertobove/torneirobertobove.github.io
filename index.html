<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenpark Bari</title>
    <style>
        :root {
            /* Per cambiare sfondo, modifica l'URL tra le virgolette */
            --bg-image: url('sfondo.jpg'); 
        }
        <style>
    :root {
        --bg-image: url('sfondo.jpg'); 
    }
    body { 
        margin: 0; 
        background-color: #004a99; /* Colore blu di base simile al campo */
        background-image: var(--bg-image);
        background-size: cover;       
        background-position: center;  
        background-attachment: fixed; 
        background-repeat: no-repeat;
        min-height: 100vh; 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        color: white;
    }
        .header-title { font-size: 1.8rem; margin-bottom: 20px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .box { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            padding: 30px; 
            border-radius: 25px; 
            text-align: center; 
            width: 85%; 
            max-width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .logo { width: 150px; margin-bottom: 10px; }
        .firma { font-style: italic; font-size: 0.85rem; margin-bottom: 20px; display: block; opacity: 0.9; }
        .btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            padding: 18px; 
            margin: 15px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn:hover { background: rgba(255, 255, 255, 0.4); }
        .footer-link { margin-top: 30px; font-size: 0.8rem; color: rgba(255,255,255,0.7); text-decoration: none; }
    </style>
</head>
<body>
    <script>
    function checkAccess() {
        const password = "TUA_PASSWORD_QUI"; // Sostituisci con la password che vuoi
        const input = prompt("Inserisci la password per accedere:");
        if (input !== password) {
            alert("Accesso negato!");
            window.location.href = "about:blank"; // Chiude o manda via l'utente
        }
    }
    // Esegue il controllo appena la pagina carica
    checkAccess();
</script>
