<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenpark Bari - Login</title>
    <style>
        :root { --bg-image: url('sfondo.jpg'); }
        body { margin:0; background-color:#004a99; background-image:var(--bg-image); background-size:cover; background-position:center; background-attachment:fixed; font-family:sans-serif; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
        .box { background:rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding:30px; border-radius:25px; width:320px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
        .logo { width:140px; margin-bottom:10px; }
        .firma { font-style:italic; font-size:0.85rem; margin-bottom:20px; opacity:0.9; display:block; }
        input { width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none; box-sizing:border-box; color: #333; }
        .buttons { display:flex; gap:10px; }
        .btn { flex:1; padding:14px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; text-transform:uppercase; background: #fff; color: #004a99; }
        #status { margin-top:15px; font-size:13px; min-height: 20px; color: #ffeb3b; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="box">
        <img src="logo.jpg" class="logo">
        <span class="firma">Roberto Bove<br>Director & Event Organizer</span>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <div class="buttons">
            <button class="btn" id="loginBtn">Accedi</button>
            <button class="btn" id="registerBtn">Registrati</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const supabaseUrl = "https://iybjvtmfaupgthqqsngd.supabase.co";
        // ATTENZIONE: Inserisci qui la tua nuova chiave pubblica generata su Supabase
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

       const client = supabase.createClient(supabaseUrl, supabaseKey);
    const status = document.getElementById("status");

        document.getElementById("registerBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            status.innerText = "Registrazione in corso...";
            const { error } = await client.auth.signUp({ email, password });
            status.innerText = error ? "Errore: " + error.message : "Controlla la tua email per confermare!";
        });

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (error) {
                status.innerText = error.message;
            } else {
                window.location.href = "Bove.html";
            }
        });
    </script>
</body>
</html>
