<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenpark Bari</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .box { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            border-radius: 25px; 
            text-align: center; 
            width: 85%; 
            max-width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .logo { width: 150px; margin-bottom: 30px; }
        .btn { 
            display: block; 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            padding: 18px; 
            margin: 15px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn:hover { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>
    <div class="box">
        <img src="logo.jpg" alt="Logo" class="logo">
        <a href="torneo_8_squadre_TOP.html" class="btn">TORNEO TOP</a>
        <a href="Torneo_8_squadre_TOP_SILVER.html" class="btn">TORNEO SILVER</a>

</body>
</html>
