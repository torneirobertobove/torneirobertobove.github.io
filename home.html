<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    /* Sostituisci l'URL qui sotto con il tuo sfondo */
    body { background: url('TUA_IMMAGINE_SFONDO.jpg') no-repeat center center fixed; background-size: cover; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .top-menu { position: absolute; top: 20px; display: flex; gap: 20px; color: white; font-size: 16px; font-weight: bold; }
    
    .glass-panel { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    
    .logo-placeholder { width: 100px; height: 100px; background: #ddd; margin: 0 auto 20px; border-radius: 10px; }
    
    input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; box-sizing: border-box; }
    
    .btn-link { color: #fff; text-decoration: none; display: block; margin: 10px 0; font-size: 14px; }
</style>
</head>
<body>

    <div class="top-menu">
        <span>Accedi</span>
        <span>Registrati</span>
    </div>

    <div class="glass-panel">
        <div class="logo-placeholder">Inserisci Logo</div>
        <h2 style="color: white;">NOME DEL TUO CLUB</h2>
        <p style="color: white;">ACCESSO UTENTI</p>
        
        <input type="text" placeholder="Email o cellulare">
        <input type="password" placeholder="Password">
        
        <a href="#" class="btn-link">Hai dimenticato la password?</a>
        <a href="#" class="btn-link">Non sei iscritto? Registrati</a>
    </div>

</body>
</html>
