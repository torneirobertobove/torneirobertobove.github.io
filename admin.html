function salvaAdminState(){

localStorage.getItem(ADMIN_STORAGE);

}catch(e){

async function caricaTorneiSupabase(){



const {

data,

error

}

=
await sb

.from("tornei")

.select("*")

.order(
"created_at",
{
ascending:false
}

);





if(error){


console.error(
"Errore caricamento tornei:",
error
);


return;


}





adminState.tornei =
(data || []).map(t=>({


...t,


iscritti:
t.iscritti || [],


partecipanti:
t.partecipanti || [],


coppie:
t.coppie || [],



configurazione:
t.configurazione || {}



}));







if(

adminState.torneoSelezionato===null

&&

adminState.tornei.length>0

){


adminState.torneoSelezionato =
adminState.tornei[0].id;


}





salvaAdminState();






}

return adminState.tornei.find(

async function creaNuovoTorneo(){



let nome=
document
.getElementById("adminNomeTorneo")
.value
.trim();



let data=
document
.getElementById("adminDataTorneo")
.value;



let posti=
Number(
document.getElementById("adminPosti").value
);



let formula=
document.getElementById("adminTipoTorneo")
.value;



let descrizione=
document
.getElementById("adminDescrizione")
.value
.trim();





if(!nome){


alert(
"Inserire nome torneo"
);


return;


}





if(!posti || posti<2){


alert(
"Numero posti non valido"
);


return;


}





const configurazione={


formula:formula,


posti:posti,


iscritti:[],


partecipanti:[],


coppie:[]


};





const {

data:nuovoTorneo,

error

}

=

await sb

.from("tornei")

.insert({


nome:nome,


data:data || null,


descrizione:descrizione,


posti:posti,


stato:"bozza",


configurazione:configurazione



})

.select()

.single();





if(error){


console.error(
error
);


alert(
"Errore creazione torneo: "
+
error.message
);


return;


}





adminState.torneoSelezionato =
nuovoTorneo.id;



await caricaTorneiSupabase();


renderAdmin();




alert(
"Torneo creato correttamente"
);



}

document.getElementById(
"dettaglioTorneoAdmin"

if(dettaglio){



let formula =
torneo.configurazione?.formula || "-";



dettaglio.innerHTML=`

${torneo.nome}

${torneo.data || "-"}

<p>

${torneo.posti}
</p>



<p>
Stato:
${torneo.stato}
</p>



`;



}





renderAdmin();



}

async function approvaIscritto(index){



let torneo =
getTorneoAdminCorrente();



if(!torneo)

return;





let iscritti =
torneo.configurazione?.iscritti || [];



let giocatore =
iscritti[index];



if(!giocatore)

return;





giocatore.stato="approvato";





let partecipanti =
torneo.configurazione?.partecipanti || [];





if(!partecipanti.some(
g=>g.email===giocatore.email
)){


partecipanti.push(
giocatore
);


}





torneo.configurazione.partecipanti =
partecipanti;





await aggiornaConfigurazioneTorneo(torneo);



renderAdmin();



}









async function rifiutaIscritto(index){



let torneo =
getTorneoAdminCorrente();



if(!torneo)

return;





let iscritti =
torneo.configurazione?.iscritti || [];





if(iscritti[index]){


iscritti[index].stato="rifiutato";


}




torneo.configurazione.iscritti =
iscritti;





await aggiornaConfigurazioneTorneo(torneo);



renderAdmin();



}

async function generaCoppieAutomatiche(){



let torneo =
getTorneoAdminCorrente();



if(!torneo)

return;





let lista =
torneo.configurazione?.partecipanti || [];





let coppie=[];





for(
let i=0;
i<lista.length-1;
i+=2
){


coppie.push({

g1:
lista[i].nome,


g2:
lista[i+1].nome


});


}






torneo.configurazione.coppie =
coppie;





await aggiornaConfigurazioneTorneo(torneo);



renderAdmin();



}

function apriWhatsApp(numero,messaggio){



if(!numero)

return;





let telefono =
numero.replace(
/[^0-9]/g,
""
);





let url =

"https://wa.me/"

+

telefono

+

"?text="

+

encodeURIComponent(messaggio);





window.open(
url,
"_blank"
);



}









async function inviaIscrizioneGiocatore(dati){



let torneo =
adminState.tornei.find(

t=>

t.id===dati.torneo_id

);





if(!torneo)

return false;





if(torneo.stato!=="pubblicato"){


alert(
"Iscrizioni non disponibili"
);


return false;


}






let iscritti =
torneo.configurazione?.iscritti || [];





iscritti.push({


id:Date.now(),


nome:dati.nome,


email:dati.email,


telefono:dati.telefono,


livello:dati.livello || "",


note:dati.note || "",


stato:"richiesta"



});






torneo.configurazione.iscritti =
iscritti;





await aggiornaConfigurazioneTorneo(torneo);



return true;



}

function getInfoTorneoPubblico(id){



let torneo =
adminState.tornei.find(

t=>

t.id===id

);





if(!torneo)

return null;






return {


id:torneo.id,


nome:torneo.nome,


data:torneo.data,


formula:
torneo.configurazione?.formula || "-",


posti:
torneo.posti,



disponibili:

torneo.posti

-

(
torneo.configurazione?.iscritti?.length || 0
)



};



}









function postiDisponibiliTorneo(id){



let torneo =
adminState.tornei.find(

t=>

t.id===id

);





if(!torneo)

return 0;





let iscritti =
torneo.configurazione?.iscritti?.length || 0;





return Math.max(

0,

torneo.posti-iscritti

);



}

coppie:
torneo.configurazione?.coppie || []



};

encodeURIComponent(

JSON.stringify(configurazione)

);

+

json;

);

function importaTorneoAdmin(file){



let reader =
new FileReader();





reader.onload=function(e){



try{



let torneo =
JSON.parse(
e.target.result
);





adminState.tornei.push(
torneo
);



salvaAdminState();



renderAdmin();





}

catch(err){



alert(
"File non valido"
);



}



};





reader.readAsText(file);



}









async function eliminaTorneoAdmin(id){



if(!confirm(
"Eliminare torneo?"
))

return;








const {error}=

await sb

.from("tornei")

.delete()

.eq(
"id",
id
);







if(error){



alert(
"Errore eliminazione: "
+
error.message
);



return;



}







adminState.tornei =

adminState.tornei.filter(

t=>

t.id!==id

);







if(
adminState.torneoSelezionato===id
){



adminState.torneoSelezionato=null;



}







salvaAdminState();



renderAdmin();






}









async function cambiaStatoTorneo(stato){



let torneo =
getTorneoAdminCorrente();





if(!torneo)

return;






const {error}=

await sb

.from("tornei")

.update({

stato:stato

})

.eq(
"id",
torneo.id
);







if(error){



console.error(
error
);



return;



}






torneo.stato=stato;



salvaAdminState();



renderAdmin();




}

let giocatoreSelezionatoAdmin=null;




function approvaGiocatore(){



if(!giocatoreSelezionatoAdmin)

return;





let torneo =
getTorneoAdminCorrente();





if(!torneo)

return;







let partecipanti =
torneo.configurazione?.partecipanti || [];






if(!partecipanti.some(

g=>

g.email===giocatoreSelezionatoAdmin.email

)){


partecipanti.push(
giocatoreSelezionatoAdmin
);



}







torneo.configurazione.partecipanti =
partecipanti;







aggiornaConfigurazioneTorneo(torneo);



document

.getElementById(
"schedaGiocatoreAdmin"
)

.classList.add(
"hidden"
);






renderAdmin();



}









function rifiutaGiocatore(){



if(!giocatoreSelezionatoAdmin)

return;





let torneo =
getTorneoAdminCorrente();





if(!torneo)

return;






let iscritti =
torneo.configurazione?.iscritti || [];





let g =
iscritti.find(

x=>

x.email===giocatoreSelezionatoAdmin.email

);






if(g)


g.stato="rifiutato";








torneo.configurazione.iscritti =
iscritti;






aggiornaConfigurazioneTorneo(torneo);






document

.getElementById(
"schedaGiocatoreAdmin"
)

.classList.add(
"hidden"
);






renderAdmin();



}
