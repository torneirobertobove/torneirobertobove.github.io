<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Tournament Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#0f172a;
--card:#111827;
--text:#e5e7eb;
--accent:#6366f1;
--green:#16a34a;
--red:#dc2626;
--border:#243041;
}
*{
box-sizing:border-box;
}
body{
margin:0;
padding:20px;
background:var(--bg);
color:var(--text);
font-family:system-ui,Arial,sans-serif;
}
.container{
max-width:1000px;
margin:auto;
}
.card{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
margin-bottom:15px;
}
h1,h2,h3{
color:white;
}
input,select,textarea{
width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:8px;
border:1px solid var(--border);
background:#0b1220;
color:white;
}
textarea{
min-height:90px;
}
button{
background:var(--accent);
color:white;
border:0;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin:5px;
}
button:hover{
opacity:.85;
}
.btn-green{
background:var(--green);
}
.btn-red{
background:var(--red);
}
.hidden{
display:none;
}
.lista-item{
background:#0b1220;
padding:12px;
border-radius:8px;
margin:8px 0;
}
.badge{
background:#334155;
padding:5px 10px;
border-radius:20px;
display:inline-block;
}
</style>
</head>

<body>

<div class="container">

<div id="loginAdmin" class="card">

<h1>🎾 Admin Padel Manager</h1>

<h2>🔐 Accesso Admin</h2>

<label>Email amministratore</label>
<input id="adminEmail" type="email" placeholder="email admin">

<label>Password</label>
<input id="adminPassword" type="password" placeholder="password">

<button onclick="loginAdmin()">Accedi</button>

<div id="loginMessaggio"></div>

</div>
<div id="areaAdmin" class="hidden">

<h1>🎾 Padel Tournament Admin</h1>

<div class="card">

<h2>➕ Crea nuovo torneo</h2>

<label>Nome torneo</label>
<input id="adminNomeTorneo" placeholder="Nome torneo">

<label>Data torneo</label>
<input id="adminDataTorneo" type="date">

<label>Numero posti disponibili</label>
<input id="adminPosti" type="number" value="16">

<label>Formula torneo</label>

<select id="adminTipoTorneo">

<option value="italiana">🇮🇹 Torneo all'italiana</option>
<option value="gironiFinale">🏆 Gironi + Fase Finale</option>
<option value="eliminazione">⚔️ Eliminazione Diretta</option>
<option value="svizzero">🇨🇭 Torneo Svizzero</option>
<option value="americano">🎾 Americano Padel</option>
<option value="mexicano">🇲🇽 Mexicano Padel</option>
<option value="king">👑 King of the Court</option>
<option value="short">⏱ Short Format</option>
<option value="manuale">⚙️ Personalizzato</option>

</select>


<label>Descrizione torneo</label>

<textarea id="adminDescrizione" placeholder="Descrizione, regole, note..."></textarea>


<button onclick="creaNuovoTorneo()" class="btn-green">
➕ CREA TORNEO
</button>


</div>


<div class="card">

<h2>📋 Tornei creati</h2>

<div id="listaTorneiAdmin"></div>

</div>


<div id="gestioneTorneoAdmin" class="card hidden">

<h2>⚙️ Gestione torneo</h2>

<div id="dettaglioTorneoAdmin"></div>

<button onclick="pubblicaTorneo()" class="btn-green">
📢 Pubblica torneo
</button>

<button onclick="chiudiIscrizioniTorneo()" class="btn-red">
🔒 Chiudi iscrizioni
</button>

<button onclick="caricaRichiesteIscrizione()">
🔄 Aggiorna iscritti
</button>

</div>
<div class="card">

<h2>👤 Richieste giocatori</h2>

<div id="richiesteIscrizione"></div>

</div>


<div class="card">

<h2>✅ Partecipanti approvati</h2>

<div id="partecipantiAdmin"></div>

</div>


<div class="card hidden" id="schedaGiocatoreAdmin">

<h2>👤 Dati giocatore</h2>

<label>Nome e Cognome</label>
<input id="adminNomeGiocatore" readonly>

<label>Email</label>
<input id="adminEmailGiocatore" readonly>

<label>Telefono</label>
<input id="adminTelefonoGiocatore" readonly>

<label>Livello gioco</label>
<input id="adminLivelloGiocatore" readonly>

<textarea id="adminNotaGiocatore" readonly></textarea>

<button onclick="approvaGiocatore()" class="btn-green">
✅ Approva
</button>

<button onclick="rifiutaGiocatore()" class="btn-red">
❌ Rifiuta
</button>

</div>


<div class="card">

<h2>👥 Gestione coppie</h2>

<div id="creaCoppieBox"></div>

</div>
<div class="card">

<h2>📲 Comunicazioni WhatsApp</h2>

<textarea id="messaggioWhatsApp" placeholder="Scrivi comunicazione..."></textarea>

<button onclick="inviaWhatsAppTutti()">
📲 Invia WhatsApp a tutti
</button>

<button onclick="inviaWhatsAppApprovati()">
📲 Solo partecipanti approvati
</button>

</div>


<div class="card">

<h2>🚀 Avvio torneo</h2>

<p>Generazione collegamento al gestionale torneo.</p>

<input id="linkBoveGenerato" readonly placeholder="Link torneo">

<button onclick="generaLinkBove()">
🔗 Genera link Bove
</button>

<button onclick="apriBoveConTorneo()">
🚀 Apri torneo
</button>

<button onclick="copiaLinkBove()">
📋 Copia link
</button>

</div>

</div>

</div>


<script>

let adminState={
adminLoggato:false,
adminEmail:"",
torneoSelezionato:null,
tornei:[]
};
  const sb = supabase.createClient(
    "https://iybjvtmfaupgthqqsngd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzIiwicmVmIjoiaXliand0bWZhdXBndGhxcXNnZCIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzgyNjY3MTg1LCJleHAiOjIwOTgyNDMxODV9.UNa_yytCp39U0R864L3drp7VDaOiOYPQy68WFysOI"
);


const ADMIN_STORAGE="padel_admin_state";


function caricaAdminState(){

let salvato=localStorage.getItem(ADMIN_STORAGE);

if(!salvato)return;

try{

adminState=JSON.parse(salvato);

}catch(e){

console.error(e);

}

}


function salvaAdminState(){

localStorage.setItem(
ADMIN_STORAGE,
JSON.stringify(adminState)
);

}


function mostraLoginMessaggio(testo,colore){

let box=document.getElementById("loginMessaggio");

if(!box)return;

box.innerHTML=testo;

box.style.color=colore||"white";

}


window.addEventListener("load",()=>{

caricaAdminState();

if(adminState.adminLoggato){

apriDashboardAdmin();

}

});
function loginAdmin(){

let email=document
.getElementById("adminEmail")
.value.trim();

let password=document
.getElementById("adminPassword")
.value.trim();


if(!email||!password){

mostraLoginMessaggio(
"Inserire email e password",
"#ef4444"
);

return;

}


adminState.adminLoggato=true;

adminState.adminEmail=email;

salvaAdminState();


mostraLoginMessaggio(
"Accesso effettuato",
"#22c55e"
);


apriDashboardAdmin();

}



function apriDashboardAdmin(){

let login=document.getElementById("loginAdmin");

let area=document.getElementById("areaAdmin");


if(login)
login.style.display="none";


if(area)
area.classList.remove("hidden");


caricaTorneiSupabase();
}



function logoutAdmin(){

adminState.adminLoggato=false;

adminState.adminEmail="";

salvaAdminState();


location.reload();

}


async function renderAdmin(){

    await caricaTorneiSupabase();

    renderListaTornei();

    renderRichiesteIscrizione();

    renderPartecipanti();

    renderCoppie();

}
  async function caricaTorneiSupabase(){

    const { data, error } = await sb
        .from("tornei")
        .select("*")
        .order("created_at", { ascending:false });


    if(error){

        console.error(
            "Errore caricamento tornei:",
            error
        );

        return;
    }


    adminState.tornei = data || [];


    if(
        adminState.torneoSelezionato === null &&
        adminState.tornei.length > 0
    ){

        adminState.torneoSelezionato =
            adminState.tornei[0].id;

    }


    salvaAdminState();

}

function getTorneoAdminCorrente(){

return adminState.tornei.find(
t=>t.id===adminState.torneoSelezionato
)||null;

}
async function creaNuovoTorneo(){

let nome=document.getElementById("adminNomeTorneo").value.trim();

let data=document.getElementById("adminDataTorneo").value;

let posti=Number(document.getElementById("adminPosti").value);

let formula=document.getElementById("adminTipoTorneo").value;

let descrizione=document.getElementById("adminDescrizione").value.trim();


if(!nome){

alert("Inserire nome torneo");
return;

}


if(!posti || posti<2){

alert("Numero posti non valido");
return;

}



const configurazione = {

formula: formula,

posti: posti

};



const { data: nuovoTorneo, error } = await sb
.from("tornei")
.insert({

nome: nome,

data: data,

descrizione: descrizione,

posti: posti,

stato:"bozza",

pubblicato:false,

configurazione: configurazione

})
.select()
.single();



if(error){

console.error(
"Errore creazione torneo:",
error
);

alert(
"Errore creazione torneo: " + error.message
);

return;

}



adminState.torneoSelezionato = nuovoTorneo.id;


await caricaTorneiSupabase();


renderAdmin();


alert("Torneo creato correttamente");

}


function renderListaTornei(){

let box=document.getElementById("listaTorneiAdmin");

if(!box)return;


if(adminState.tornei.length===0){

box.innerHTML="<p>Nessun torneo creato</p>";

return;

}


box.innerHTML=adminState.tornei.map(t=>`

<div class="lista-item">

<b>${t.nome}</b><br>

📅 ${t.data||"-"}<br>

🎾 ${t.formula}<br>

👥 ${t.posti}<br>

<span class="badge">${t.stato}</span><br>

<button onclick="selezionaTorneoAdmin(${t.id})">
⚙️ Gestisci
</button>

</div>

`).join("");

}




function selezionaTorneoAdmin(id){

let torneo=adminState.tornei.find(
t=>t.id===id
);


if(!torneo)return;


adminState.torneoSelezionato=id;

salvaAdminState();


let box=document.getElementById("gestioneTorneoAdmin");

if(box)
box.classList.remove("hidden");


let dettaglio=document.getElementById("dettaglioTorneoAdmin");


if(dettaglio){

dettaglio.innerHTML=`

<h3>${torneo.nome}</h3>

<p>
Formula: ${torneo.formula}
</p>

<p>
Iscritti:
${torneo.iscritti.length}/${torneo.posti}
</p>

`;

}

}
function pubblicaTorneo(){

let torneo=getTorneoAdminCorrente();

if(!torneo)return;


torneo.stato="pubblicato";

salvaAdminState();

renderAdmin();


alert("Torneo pubblicato");

}



function chiudiIscrizioniTorneo(){

let torneo=getTorneoAdminCorrente();

if(!torneo)return;


torneo.stato="iscrizioni_chiuse";

salvaAdminState();

renderAdmin();

}



function caricaRichiesteIscrizione(){

renderRichiesteIscrizione();

}



function renderRichiesteIscrizione(){

let box=document.getElementById("richiesteIscrizione");

if(!box)return;


let torneo=getTorneoAdminCorrente();


if(!torneo){

box.innerHTML="<p>Nessun torneo selezionato</p>";

return;

}



if(torneo.iscritti.length===0){

box.innerHTML="<p>Nessuna richiesta iscrizione</p>";

return;

}



box.innerHTML=torneo.iscritti.map((g,i)=>`

<div class="lista-item">

<b>${g.nome}</b><br>

📧 ${g.email}<br>

📱 ${g.telefono}<br>

🎾 ${g.livello||"-"}<br>


<button class="btn-green"
onclick="approvaIscritto(${i})">

✅ Approva

</button>


<button class="btn-red"
onclick="rifiutaIscritto(${i})">

❌ Rifiuta

</button>


</div>

`).join("");

}
function approvaIscritto(index){

let torneo=getTorneoAdminCorrente();

if(!torneo)return;


let giocatore=torneo.iscritti[index];

if(!giocatore)return;


giocatore.stato="approvato";


if(!torneo.partecipanti.some(
g=>g.email===giocatore.email
)){

torneo.partecipanti.push(giocatore);

}


salvaAdminState();

renderAdmin();

}




function rifiutaIscritto(index){

let torneo=getTorneoAdminCorrente();

if(!torneo)return;


let giocatore=torneo.iscritti[index];

if(!giocatore)return;


giocatore.stato="rifiutato";


salvaAdminState();

renderAdmin();

}




function renderPartecipanti(){

let box=document.getElementById(
"partecipantiAdmin"
);

if(!box)return;


let torneo=getTorneoAdminCorrente();


if(!torneo){

box.innerHTML="";

return;

}



if(torneo.partecipanti.length===0){

box.innerHTML=
"<p>Nessun partecipante approvato</p>";

return;

}



box.innerHTML=torneo.partecipanti.map((g,i)=>`

<div class="lista-item">

<b>${i+1}) ${g.nome}</b><br>

📧 ${g.email}<br>

📱 ${g.telefono}

</div>

`).join("");

}





function renderCoppie(){

let box=document.getElementById(
"creaCoppieBox"
);

if(!box)return;


let torneo=getTorneoAdminCorrente();


if(!torneo){

box.innerHTML="";

return;

}



if(torneo.partecipanti.length<2){

box.innerHTML=
"<p>Servono almeno due giocatori</p>";

return;

}



box.innerHTML=`

<button onclick="generaCoppieAutomatiche()">

👥 Crea coppie automatiche

</button>


<div>

${
torneo.coppie.map((c,i)=>`

<p>
Coppia ${i+1}: 
${c.g1} + ${c.g2}
</p>

`).join("")
}

</div>

`;

}





function generaCoppieAutomatiche(){

let torneo=getTorneoAdminCorrente();

if(!torneo)return;


let lista=torneo.partecipanti;

let coppie=[];


for(let i=0;i<lista.length-1;i+=2){

coppie.push({

g1:lista[i].nome,

g2:lista[i+1].nome

});

}


torneo.coppie=coppie;


salvaAdminState();

renderAdmin();

}
function inviaWhatsAppTutti(){

let torneo=getTorneoAdminCorrente();

if(!torneo){

alert("Seleziona torneo");

return;

}



let testo=document.getElementById(
"messaggioWhatsApp"
).value.trim();


if(!testo){

alert("Inserisci messaggio");

return;

}



torneo.partecipanti.forEach(g=>{

apriWhatsApp(
g.telefono,
testo
);

});

}




function inviaWhatsAppApprovati(){

inviaWhatsAppTutti();

}




function apriWhatsApp(numero,messaggio){

if(!numero)return;


let telefono=numero.replace(
/[^0-9]/g,
""
);


let url=

"https://wa.me/"
+
telefono
+
"?text="
+
encodeURIComponent(messaggio);



window.open(
url,
"_blank"
);

}





function inviaIscrizioneGiocatore(dati){

let torneo=adminState.tornei.find(
t=>t.id===dati.torneo_id
);


if(!torneo)return false;


if(torneo.stato!=="pubblicato"){

alert("Iscrizioni chiuse");

return false;

}



if(
!dati.nome ||
!dati.email ||
!dati.telefono
){

alert(
"Nome email e telefono obbligatori"
);

return false;

}



torneo.iscritti.push({

id:Date.now(),

nome:dati.nome,

email:dati.email,

telefono:dati.telefono,

livello:dati.livello||"",

note:dati.note||"",

stato:"richiesta"

});



salvaAdminState();


return true;

}




function listaTorneiPubblici(){

return adminState.tornei.filter(
t=>t.stato==="pubblicato"
);

}
function getInfoTorneoPubblico(id){

let torneo=adminState.tornei.find(
t=>t.id===id
);


if(!torneo)return null;


return {

id:torneo.id,

nome:torneo.nome,

data:torneo.data,

formula:torneo.formula,

posti:torneo.posti,

disponibili:
torneo.posti-torneo.iscritti.length

};

}





function postiDisponibiliTorneo(id){

let torneo=adminState.tornei.find(
t=>t.id===id
);


if(!torneo)return 0;


return Math.max(
0,
torneo.posti-torneo.iscritti.length
);

}





function generaLinkBove(){

let torneo=getTorneoAdminCorrente();


if(!torneo){

alert("Seleziona torneo");

return;

}



let configurazione={

idTorneo:torneo.id,

nomeTorneo:torneo.nome,

data:torneo.data,

formula:torneo.formula,

posti:torneo.posti,

partecipanti:torneo.partecipanti,

coppie:torneo.coppie

};



let json=encodeURIComponent(
JSON.stringify(configurazione)
);



let link=
"Bove.html?torneo="+json;



let campo=document.getElementById(
"linkBoveGenerato"
);



if(campo)

campo.value=link;



}





function apriBoveConTorneo(){

let campo=document.getElementById(
"linkBoveGenerato"
);



if(!campo.value)

generaLinkBove();



if(campo.value)

window.open(
campo.value,
"_blank"
);

}





function copiaLinkBove(){

let campo=document.getElementById(
"linkBoveGenerato"
);


if(!campo)return;


campo.select();


navigator.clipboard.writeText(
campo.value
);


alert("Link copiato");

}





function esportaListaTorneiPubblici(){

return adminState.tornei
.filter(
t=>t.stato==="pubblicato"
)
.map(t=>({

id:t.id,

nome:t.nome,

data:t.data,

formula:t.formula,

posti:t.posti

}));

}





const SUPABASE_ADMIN_CONFIG={

url:"",

key:""

};





async function salvaTorneoSupabase(){

let torneo=getTorneoAdminCorrente();


if(!torneo)return;


console.log(
"Predisposizione Supabase",
torneo
);

}





function importaTorneoAdmin(file){

let reader=new FileReader();


reader.onload=function(e){

try{


let torneo=JSON.parse(
e.target.result
);


adminState.tornei.push(
torneo
);


salvaAdminState();

renderAdmin();


}
catch(err){

alert(
"File non valido"
);

}


};


reader.readAsText(file);

}





function eliminaTorneoAdmin(id){

if(!confirm(
"Eliminare torneo?"
))

return;



adminState.tornei=
adminState.tornei.filter(
t=>t.id!==id
);



if(
adminState.torneoSelezionato===id
)

adminState.torneoSelezionato=null;



salvaAdminState();

renderAdmin();

}





function cambiaStatoTorneo(stato){

let torneo=getTorneoAdminCorrente();


if(!torneo)return;


torneo.stato=stato;


salvaAdminState();

renderAdmin();

}





document.addEventListener(
"DOMContentLoaded",
()=>{

caricaAdminState();


if(adminState.adminLoggato)

apriDashboardAdmin();


}
);

</script>

</body>
</html>
