<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Padel Tournament Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

:root{

--bg:#0f172a;
--card:#111827;
--text:#e5e7eb;
--accent:#6366f1;
--green:#16a34a;
--red:#dc2626;
--border:#243041;

}


*{
box-sizing:border-box;
}


body{

margin:0;
padding:20px;
background:var(--bg);
color:var(--text);
font-family:system-ui,Arial,sans-serif;

}


.container{

max-width:1000px;
margin:auto;

}


.card{

background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:20px;
margin-bottom:15px;

}


h1,h2,h3{

color:white;

}


input,
select,
textarea{

width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:8px;
border:1px solid var(--border);
background:#0b1220;
color:white;

}


textarea{

min-height:90px;

}


button{

background:var(--accent);
color:white;
border:0;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin:5px;
font-weight:bold;

}


button:hover{

opacity:.85;

}


.btn-green{

background:var(--green);

}


.btn-red{

background:var(--red);

}


.hidden{

display:none;

}


.lista-item{

background:#0b1220;
padding:12px;
border-radius:8px;
margin:8px 0;

}


.badge{

background:#334155;
padding:5px 10px;
border-radius:20px;
display:inline-block;

}


</style>

</head>


<body>


<div class="container">


<div id="areaAdmin" class="hidden">


<h1>🎾 Padel Tournament Admin</h1>


<div class="card">

<h2>➕ Crea nuovo torneo</h2>


<label>Nome torneo</label>

<input id="adminNomeTorneo" placeholder="Nome torneo">


<label>Data torneo</label>

<input id="adminDataTorneo" type="date">


<label>Numero posti disponibili</label>

<input id="adminPosti" type="number" value="16">


<label>Formula torneo</label>

<select id="adminTipoTorneo">

<option value="italiana">🇮🇹 Torneo all'italiana</option>
<option value="gironiFinale">🏆 Gironi + Fase Finale</option>
<option value="eliminazione">⚔️ Eliminazione Diretta</option>
<option value="svizzero">🇨🇭 Torneo Svizzero</option>
<option value="americano">🎾 Americano Padel</option>
<option value="mexicano">🇲🇽 Mexicano Padel</option>
<option value="king">👑 King of the Court</option>
<option value="short">⏱ Short Format</option>
<option value="manuale">⚙️ Personalizzato</option>

</select>


<label>Descrizione torneo</label>

<textarea id="adminDescrizione" placeholder="Descrizione, regole, note..."></textarea>


<button onclick="creaNuovoTorneo()" class="btn-green">

➕ CREA TORNEO

</button>


</div>


<div class="card">

<h2>📋 Tornei creati</h2>

<div id="listaTorneiAdmin"></div>

</div>


<div id="gestioneTorneoAdmin" class="card hidden">


<h2>⚙️ Gestione torneo</h2>


<div id="dettaglioTorneoAdmin"></div>


<button 
onclick="pubblicaTorneo()" 
class="btn-green">

📢 Pubblica torneo

</button>


<button 
onclick="chiudiIscrizioniTorneo()" 
class="btn-red">

🔒 Chiudi iscrizioni

</button>


<button onclick="caricaRichiesteIscrizione()">

🔄 Aggiorna iscritti

</button>


</div>


<div class="card">

<h2>👤 Richieste giocatori</h2>

<div id="richiesteIscrizione"></div>

</div>


<div class="card">

<h2>✅ Partecipanti approvati</h2>

<details id="partecipantiPanel">

<summary style="
cursor:pointer;
font-weight:bold;
padding:10px;
background:#0b1220;
border-radius:8px;
">

👥 Visualizza partecipanti

</summary>

<div id="partecipantiAdmin" style="margin-top:10px;"></div>

</details>

</div>


<div class="card">

<h2>👥 Gestione coppie</h2>

<div id="creaCoppieBox"></div>

</div>


<div class="card">

<h2>📲 Comunicazioni WhatsApp</h2>

<textarea 
id="messaggioWhatsApp"
placeholder="Scrivi comunicazione..."></textarea>


<button onclick="inviaWhatsAppTutti()">

📲 Invia WhatsApp a tutti

</button>


<button onclick="inviaWhatsAppApprovati()">

📲 Solo partecipanti approvati

</button>

</div>


<div class="card">

<h2>🚀 Avvio torneo</h2>

<p>
Generazione collegamento al gestionale torneo.
</p>


<input 
id="linkBoveGenerato"
readonly
placeholder="Link torneo">


<button onclick="generaLinkBove()">

🔗 Genera link Bove

</button>


<button onclick="apriBoveConTorneo()">

🚀 Apri torneo

</button>


<button onclick="copiaLinkBove()">

📋 Copia link

</button>

</div>


<div class="card">

<button onclick="logoutAdmin()" class="btn-red">

🚪 Logout

</button>

</div>


</div>


</div>
<script>
const SUPABASE_URL = "https://iybjvtmfaupgthqqsngd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjcxODUsImV4cCI6MjA5ODI0MzE4NX0.UNa_yytCp39Uvu0R864L3drp7VDaOiOYPQy68WFysOI";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ADMIN_STORAGE = "padel_admin_state";

let adminState = {
  adminLoggato: false,
  adminEmail: "",
  torneoSelezionato: null,
  tornei: [],
  profile: null
};

function salvaAdminState() {
  localStorage.setItem(ADMIN_STORAGE, JSON.stringify(adminState));
}

function caricaAdminState() {
  const salvato = localStorage.getItem(ADMIN_STORAGE);
  if (!salvato) return;

  try {
    const parsed = JSON.parse(salvato);
    adminState = {
      ...adminState,
      ...parsed,
      tornei: parsed.tornei || []
    };
  } catch (e) {
    console.error("Errore caricamento stato admin", e);
  }
}

async function initAdmin() {
  caricaAdminState();

  const { data } = await sb.auth.getSession();
  const session = data?.session;

  if (!session) {
    location.href = "index.html";
    return false;
  }

  const { data: profilo, error } = await sb
    .from("profili")
    .select("*")
    .eq("user_id", session.user.id)
    .single();

  if (error || !profilo || profilo.ruolo !== "admin") {
    await sb.auth.signOut();
    location.href = "index.html";
    return false;
  }

  adminState.adminLoggato = true;
  adminState.adminEmail = session.user.email || "";
  adminState.profile = profilo;

  salvaAdminState();
  await apriDashboardAdmin();
  return true;
}

async function apriDashboardAdmin() {
  const area = document.getElementById("areaAdmin");
  if (area) {
    area.classList.remove("hidden");
  }

  await caricaTorneiSupabase();
  renderAdmin();
}

async function logoutAdmin() {
  adminState.adminLoggato = false;
  adminState.adminEmail = "";
  adminState.torneoSelezionato = null;
  adminState.tornei = [];
  adminState.profile = null;

  localStorage.removeItem(ADMIN_STORAGE);
  await sb.auth.signOut();
  location.href = "index.html";
}

async function caricaTorneiSupabase() {
  const { data, error } = await sb
    .from("tornei")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Errore caricamento tornei:", error);
    return;
  }

  adminState.tornei = (data || []).map(t => ({
    ...t,
    configurazione: {
      ...(t.configurazione || {}),
      formula: t.configurazione?.formula || t.formula || "manuale",
      iscritti: t.configurazione?.iscritti || [],
      partecipanti: t.configurazione?.partecipanti || [],
      coppie: t.configurazione?.coppie || []
    }
  }));

  if (adminState.tornei.length > 0 && !adminState.torneoSelezionato) {
    adminState.torneoSelezionato = adminState.tornei[0].id;
  }

  salvaAdminState();
}

function getTorneoAdminCorrente() {
  console.log("ID selezionato:", adminState.torneoSelezionato);
  console.log("TORNEI:", adminState.tornei);

  return adminState.tornei.find(
    t => Number(t.id) === Number(adminState.torneoSelezionato)
  ) || null;
}

function selezionaTorneoAdmin(id) {
  const torneoId = Number(id);
  const torneo = adminState.tornei.find(t => Number(t.id) === torneoId);

  console.log("CLICK GESTISCI ID:", torneoId);
  console.log("TORNEO TROVATO:", torneo);

  if (!torneo) {
    alert("Torneo non trovato");
    return;
  }

  adminState.torneoSelezionato = torneoId;
  salvaAdminState();
  renderAdmin();
}

async function creaNuovoTorneo() {
  const nome = document.getElementById("adminNomeTorneo").value.trim();
  const data = document.getElementById("adminDataTorneo").value;
  const posti = Number(document.getElementById("adminPosti").value);
  const formula = document.getElementById("adminTipoTorneo").value;
  const descrizione = document.getElementById("adminDescrizione").value.trim();

  if (!nome) {
    alert("Inserire nome torneo");
    return;
  }

  if (!posti || posti < 2) {
    alert("Numero posti non valido");
    return;
  }

  const configurazione = {
    formula,
    iscritti: [],
    partecipanti: [],
    coppie: []
  };

  const { data: nuovoTorneo, error } = await sb
    .from("tornei")
    .insert({
      nome,
      data: data || null,
      descrizione,
      posti,
      stato: "bozza",
      pubblicato: false,
      iscrizioni_chiuse: false,
      configurazione
    })
    .select()
    .single();

  if (error) {
    console.error(error);
    alert("Errore creazione torneo: " + error.message);
    return;
  }

  adminState.torneoSelezionato = nuovoTorneo.id;
  await caricaTorneiSupabase();
  renderAdmin();
  alert("Torneo creato correttamente");
}

function renderListaTornei() {
  const box = document.getElementById("listaTorneiAdmin");
  if (!box) return;

  if (adminState.tornei.length === 0) {
    box.innerHTML = "<p>Nessun torneo creato</p>";
    return;
  }

  box.innerHTML = adminState.tornei.map(t => {
    const formula = t.configurazione?.formula || t.formula || "-";
    return `
      <div class="lista-item">
        <b>${t.nome || "-"}</b><br>
        📅 ${t.data || "-"}<br>
        🎾 ${formula}<br>
        👥 ${t.posti || "-"}<br>
        <span class="badge">${t.stato || "bozza"}</span><br>
        <button onclick="selezionaTorneoAdmin(${t.id})">⚙️ Gestisci</button>
        <button class="btn-red" onclick="eliminaTorneoAdmin(${t.id})">🗑 Elimina</button>
      </div>
    `;
  }).join("");
}

function renderPartecipanti() {
  const box = document.getElementById("partecipantiAdmin");
  if (!box) return;

  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    box.innerHTML = "";
    return;
  }

  const lista = torneo.configurazione?.partecipanti || [];

  if (lista.length === 0) {
    box.innerHTML = "<p>Nessun partecipante approvato</p>";
    return;
  }

  box.innerHTML = lista.map((g, i) => `
    <div class="lista-item">
      <b>${i + 1}) ${g.nome_giocatore || g.nome || "-"}</b><br>
      📧 ${g.email || "-"}<br>
      📱 ${g.telefono || "-"}<br>
      🎾 ${g.categoria || g.livello || "-"}
    </div>
  `).join("");
}

function renderCoppie() {
  const box = document.getElementById("creaCoppieBox");
  if (!box) return;

  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    box.innerHTML = "";
    return;
  }

  const configurazione = torneo.configurazione || {};
  const partecipanti = configurazione.partecipanti || [];
  const coppie = configurazione.coppie || [];

  if (partecipanti.length < 2) {
    box.innerHTML = "<p>Servono almeno due giocatori approvati</p>";
    return;
  }

  box.innerHTML = `
    <button onclick="generaCoppieAutomatiche()">👥 Crea coppie automatiche</button>
    <div>
      ${coppie.map((c, i) => `
        <p><b>Coppia ${i + 1}</b><br>${c.g1 || "-"} + ${c.g2 || "-"}</p>
      `).join("")}
    </div>
  `;
}

function renderRichiesteIscrizione() {
  const box = document.getElementById("richiesteIscrizione");
  if (!box) return;

  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    box.innerHTML = "<p>Nessun torneo selezionato</p>";
    return;
  }

  const iscritti = torneo.configurazione?.iscritti || [];
  const richiestePendenti = iscritti.filter(g => !g.stato || g.stato === "richiesta");

  if (richiestePendenti.length === 0) {
    box.innerHTML = `
      <details>
        <summary style="cursor:pointer;font-weight:bold;padding:10px;background:#334155;border-radius:8px;">
          👤 Richieste iscrizione (0)
        </summary>
        <div style="margin-top:10px;padding:10px;">Nessuna richiesta iscrizione</div>
      </details>
    `;
    return;
  }

  box.innerHTML = `
    <details>
      <summary style="cursor:pointer;font-weight:bold;padding:10px;background:#334155;border-radius:8px;">
        👤 Richieste iscrizione (${richiestePendenti.length})
      </summary>
      <div style="margin-top:10px;max-height:400px;overflow-y:auto;">
        ${richiestePendenti.map((g) => {
          const indice = iscritti.findIndex(x => x.id === g.id);
          return `
            <div class="lista-item">
              <b>${g.nome_giocatore || g.nome || "Nome non disponibile"}</b><br>
              📧 ${g.email || "-"}<br>
              📱 ${g.telefono || "-"}<br>
              🎾 ${g.categoria || g.livello || "-"}<br>
              📝 ${g.note || "-"}<br><br>
              Stato: <span style="font-weight:bold;color:#facc15;">${g.stato || "richiesta"}</span><br><br>
              <button class="btn-green" onclick="approvaIscritto(${indice})">✅ Approva</button>
              <button class="btn-red" onclick="rifiutaIscritto(${indice})">❌ Rifiuta</button>
            </div>
          `;
        }).join("")}
      </div>
    </details>
  `;
}

async function caricaRichiesteIscrizione() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    alert("Nessun torneo selezionato");
    return;
  }

  const { data, error } = await sb
    .from("iscrizioni")
    .select("*")
    .eq("torneo_id", torneo.id)
    .eq("stato", "richiesta");

  console.log("ISCRIZIONI LETTE:", data);
  console.log("ERRORE ISCRIZIONI:", error);

  if (error) {
    console.error(error);
    return;
  }

  torneo.configurazione = torneo.configurazione || {};
  torneo.configurazione.iscritti = data || [];
  renderRichiesteIscrizione();
}

async function aggiornaConfigurazioneTorneo(torneo) {
  const { error } = await sb
    .from("tornei")
    .update({
      configurazione: torneo.configurazione
    })
    .eq("id", torneo.id);

  if (error) {
    console.error("Errore aggiornamento configurazione:", error);
    alert("Errore aggiornamento: " + error.message);
    return;
  }

  await caricaTorneiSupabase();
}

async function approvaIscritto(index) {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) return;

  const iscritti = torneo.configurazione?.iscritti || [];
  const giocatore = iscritti[index];
  if (!giocatore) return;

  giocatore.stato = "approvato";
  giocatore.approvato = true;

  console.log("ID che sto aggiornando:", giocatore.id);
  console.log("Giocatore completo:", giocatore);

  const { error: erroreApprovazione } = await sb
    .from("iscrizioni")
    .update({
      stato: "approvato",
      approvato: true,
      updated_at: new Date().toISOString()
    })
    .eq("id", giocatore.id);

  console.log("Errore UPDATE:", erroreApprovazione);

  if (erroreApprovazione) {
    console.error("Errore aggiornamento iscrizione:", erroreApprovazione);
    alert("Errore approvazione giocatore");
    return;
  }

  const partecipanti = torneo.configurazione?.partecipanti || [];
  const giaPresente = partecipanti.some(g =>
    (g.id && giocatore.id && Number(g.id) === Number(giocatore.id)) ||
    ((g.nome_giocatore || g.nome || "") === (giocatore.nome_giocatore || giocatore.nome || ""))
  );

  if (!giaPresente) {
    partecipanti.push(giocatore);
  }

  torneo.configurazione = torneo.configurazione || {};
  torneo.configurazione.partecipanti = partecipanti;
  torneo.configurazione.iscritti = iscritti;

  await aggiornaConfigurazioneTorneo(torneo);
  await caricaTorneiSupabase();
  renderAdmin();
}

async function rifiutaIscritto(index) {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) return;

  const iscritti = torneo.configurazione?.iscritti || [];
  if (iscritti[index]) {
    iscritti[index].stato = "rifiutato";
  }

  torneo.configurazione.iscritti = iscritti;
  await aggiornaConfigurazioneTorneo(torneo);
  renderAdmin();
}

async function pubblicaTorneo() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    alert("Nessun torneo selezionato");
    return;
  }

  const { data, error } = await sb
    .from("tornei")
    .update({
      stato: "pubblicato",
      pubblicato: true
    })
    .eq("id", torneo.id)
    .select("*");

  console.log("UPDATE RISULTATO:", data);
  console.log("UPDATE ERRORE:", error);

  if (error) {
    alert("Errore pubblicazione: " + error.message);
    return;
  }

  await caricaTorneiSupabase();
  renderAdmin();
}

async function chiudiIscrizioniTorneo() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) return;

  const { error } = await sb
    .from("tornei")
    .update({
      stato: "iscrizioni_chiuse",
      iscrizioni_chiuse: true
    })
    .eq("id", torneo.id);

  if (error) {
    alert("Errore: " + error.message);
    return;
  }

  await caricaTorneiSupabase();
  renderAdmin();
}

async function inviaWhatsAppTutti() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    alert("Seleziona un torneo");
    return;
  }

  const campoMessaggio = document.getElementById("messaggioWhatsApp");
  if (!campoMessaggio) return;

  const testo = campoMessaggio.value.trim();
  if (!testo) {
    alert("Inserire messaggio");
    return;
  }

  const partecipanti = torneo.configurazione?.partecipanti || [];
  if (partecipanti.length === 0) {
    alert("Nessun partecipante approvato");
    return;
  }

  let inviati = 0;
  partecipanti.forEach(g => {
    if (g.telefono && String(g.telefono).trim() !== "") {
      apriWhatsApp(g.telefono, testo);
      inviati++;
    }
  });

  if (inviati === 0) {
    alert("Nessun partecipante con numero WhatsApp");
    return;
  }

  console.log("WhatsApp aperti:", inviati);
}

function inviaWhatsAppApprovati() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    alert("Seleziona un torneo");
    return;
  }

  const campoMessaggio = document.getElementById("messaggioWhatsApp");
  const testo = campoMessaggio.value.trim();

  if (!testo) {
    alert("Inserire messaggio");
    return;
  }

  const partecipanti = torneo.configurazione?.partecipanti || [];
  partecipanti.forEach(g => {
    if (g.telefono) {
      apriWhatsApp(g.telefono, testo);
    }
  });
}

function apriWhatsApp(numero, messaggio) {
  if (!numero) return;

  const telefono = String(numero).replace(/[^0-9]/g, "");
  if (!telefono) return;

  const url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(messaggio);
  window.open(url, "_blank");
}

function generaLinkBove() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) {
    alert("Seleziona torneo");
    return;
  }

  const configurazione = {
    idTorneo: torneo.id,
    nomeTorneo: torneo.nome,
    data: torneo.data,
    formula: torneo.configurazione?.formula || torneo.formula || "-",
    posti: torneo.posti,
    partecipanti: torneo.configurazione?.partecipanti || [],
    coppie: torneo.configurazione?.coppie || []
  };

  const json = encodeURIComponent(JSON.stringify(configurazione));

  const link = window.location.origin
    + window.location.pathname.replace("admin.html", "")
    + "Bove.html?torneo="
    + json;

  const campo = document.getElementById("linkBoveGenerato");
  if (campo) {
    campo.value = link;
  }
}

function apriBoveConTorneo() {
  const campo = document.getElementById("linkBoveGenerato");
  if (!campo) return;

  if (!campo.value) {
    generaLinkBove();
  }

  if (campo.value) {
    window.open(campo.value, "_blank");
  }
}

async function copiaLinkBove() {
  const campo = document.getElementById("linkBoveGenerato");
  if (!campo) return;

  if (!campo.value) {
    alert("Nessun link disponibile");
    return;
  }

  try {
    await navigator.clipboard.writeText(campo.value);
    alert("Link copiato");
  } catch (e) {
    console.error("Errore copia link:", e);
    alert("Impossibile copiare il link");
  }
}

async function eliminaTorneoAdmin(id) {
  if (!confirm("Eliminare questo torneo?")) return;

  const torneoId = Number(id);
  const { error } = await sb
    .from("tornei")
    .delete()
    .eq("id", torneoId);

  if (error) {
    alert("Errore eliminazione: " + error.message);
    return;
  }

  adminState.tornei = adminState.tornei.filter(t => Number(t.id) !== torneoId);

  if (Number(adminState.torneoSelezionato) === torneoId) {
    adminState.torneoSelezionato = null;
  }

  salvaAdminState();
  renderAdmin();
}

async function generaCoppieAutomatiche() {
  const torneo = getTorneoAdminCorrente();
  if (!torneo) return;

  torneo.configurazione = torneo.configurazione || {};
  const partecipanti = torneo.configurazione.partecipanti || [];

  if (partecipanti.length < 2) {
    alert("Servono almeno due partecipanti");
    return;
  }

  const coppie = [];

  for (let i = 0; i < partecipanti.length - 1; i += 2) {
    const g1 = partecipanti[i];
    const g2 = partecipanti[i + 1];
    if (!g1 || !g2) continue;

    coppie.push({
      g1: g1.nome_giocatore || g1.nome || "-",
      g2: g2.nome_giocatore || g2.nome || "-"
    });
  }

  torneo.configurazione.coppie = coppie;
  await aggiornaConfigurazioneTorneo(torneo);
  renderAdmin();
}

function renderAdmin() {
  renderListaTornei();
  renderRichiesteIscrizione();
  renderPartecipanti();
  renderCoppie();

  const torneo = getTorneoAdminCorrente();
  const gestione = document.getElementById("gestioneTorneoAdmin");

  if (gestione) {
    if (torneo) {
      gestione.classList.remove("hidden");
    } else {
      gestione.classList.add("hidden");
    }
  }

  if (torneo) {
    const dettaglio = document.getElementById("dettaglioTorneoAdmin");
    if (dettaglio) {
      dettaglio.innerHTML = `
        <h3>${torneo.nome || "-"}</h3>
        <p>📅 Data: ${torneo.data || "-"}</p>
        <p>🎾 Formula: ${torneo.configurazione?.formula || torneo.formula || "-"}</p>
        <p>👥 Posti: ${torneo.posti || "-"}</p>
        <p>Stato: ${torneo.stato || "bozza"}</p>
      `;
    }
  }
}

async function ricaricaTorneoCorrente() {
  await caricaTorneiSupabase();
  renderAdmin();
}

function windowBind() {
  window.renderAdmin = renderAdmin;
  window.creaNuovoTorneo = creaNuovoTorneo;

  window.approvaIscritto = approvaIscritto;
  window.rifiutaIscritto = rifiutaIscritto;
  window.generaCoppieAutomatiche = generaCoppieAutomatiche;
  window.inviaWhatsAppTutti = inviaWhatsAppTutti;
  window.inviaWhatsAppApprovati = inviaWhatsAppApprovati;
  window.generaLinkBove = generaLinkBove;
  window.apriBoveConTorneo = apriBoveConTorneo;
  window.copiaLinkBove = copiaLinkBove;
  window.eliminaTorneoAdmin = eliminaTorneoAdmin;

}

windowBind();

if (!window.adminLoadAvviato) {
  window.adminLoadAvviato = true;
  window.addEventListener("load", async () => {
    await initAdmin();
  });
}
