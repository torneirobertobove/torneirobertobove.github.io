<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Torneo 8 Squadre</title>

<style>
:root{--bg:#0f172a;--card:#111827;--line:#243041;--text:#e5e7eb;}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(160deg,#0b1020,#111827);
  color:var(--text);
  padding-bottom:50px;
}
.container{max-width:1000px;margin:0 auto;padding:10px}

.header-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}
@media(min-width:600px){
  .header-box{flex-direction:row;gap:30px;}
}

.subtitle{font-size:0.7rem;color:#94a3b8;text-align:center}

.date-input-field{
  background:#0b1220;
  border:1px solid #334155;
  color:#fff;
  padding:5px;
  border-radius:4px;
  width:110px;
  text-align:center;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.btn-group{display:flex;gap:6px}

button{
  padding:8px 12px;
  border-radius:8px;
  border:0;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
}

button.reset{background:#dc2626}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  padding:20px;
}

.modal-content{
  background:#111827;
  max-width:500px;
  margin:auto;
  padding:20px;
  border-radius:12px;
  border:1px solid #243041;
}

.groups{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
@media(min-width:600px){
  .groups{grid-template-columns:1fr 1fr;}
}

.card{
  background:#111827;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #1f2a3c;
  text-align:center;
}

input{
  width:100%;
  padding:5px;
  background:#0b1220;
  border:1px solid #334155;
  color:#fff;
  text-align:center;
  border-radius:4px;
}

.ko{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

@media(min-width:600px){
  .ko{grid-template-columns:1fr 1fr;}
}

.koBox{
  background:#0b1220;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
}

.match{
  padding:8px;
  margin-bottom:8px;
  border:1px solid #243041;
  border-radius:8px;
  text-align:center;
}

.finalContainer{
  margin-top:20px;
  padding:15px;
  border:2px solid #eab308;
  border-radius:15px;
  background:#1e293b;
}

.winner-box{
  margin-top:10px;
  padding:12px;
  text-align:center;
  font-weight:bold;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header-box">
    <div>
      <img src="logo.jpg" style="width:60px;height:60px;border-radius:50%">
      <div class="subtitle">Director & Event Organizer</div>
    </div>

    <div style="text-align:center">
      <h2>🏆 Torneo 8 Squadre</h2>
      <input class="date-input-field" placeholder="Nome Torneo">
      <div style="display:flex;gap:10px;margin-top:10px">
        <input type="date" class="date-input-field">
        <input type="time" class="date-input-field">
      </div>
    </div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="btn-group">
      <button>Import Excel</button>
      <button>Regole</button>
    </div>

    <div class="btn-group">
      <button>Squadre</button>
    </div>

    <div class="btn-group">
      <button class="reset">Reset</button>
      <button>Stampa</button>
      <button>Salva</button>
    </div>
  </div>

  <!-- MODALI (SOLO STRUTTURA) -->
  <div class="modal" id="rulesModal">
    <div class="modal-content">
      <h3>Regole</h3>
    </div>
  </div>

  <div class="modal" id="teamModal">
    <div class="modal-content">
      <h3>Squadre</h3>
      <textarea style="width:100%;height:120px"></textarea>
    </div>
  </div>

  <!-- GIRONI -->
  <div class="groups">

    <div class="card">
      <h3>Girone A</h3>
      <table>
        <thead>
          <tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr>
        </thead>
        <tbody id="Arows"></tbody>
      </table>

      <h4>Classifica A</h4>
      <table>
        <tbody id="Aclass"></tbody>
      </table>
    </div>

    <div class="card">
      <h3>Girone B</h3>
      <table>
        <thead>
          <tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr>
        </thead>
        <tbody id="Brows"></tbody>
      </table>

      <h4>Classifica B</h4>
      <table>
        <tbody id="Bclass"></tbody>
      </table>
    </div>

  </div>

  <!-- KO -->
  <div class="ko">

    <div class="koBox">
      <h3>🏁 Quarti</h3>
      <div id="Q"></div>
    </div>

    <div class="koBox">
      <h3>🔥 Semifinali</h3>
      <div id="S"></div>
    </div>

  </div>

  <!-- FINALE -->
  <div class="finalContainer" id="F">
    <h3>🏆 Finale</h3>
  </div>

</div>

</body>
</html>
