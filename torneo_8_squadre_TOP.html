<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Torneo 8 Squadre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f172a;--card:#111827;--line:#243041;--text:#e5e7eb;}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:linear-gradient(160deg,#0b1020,#111827);color:var(--text);padding-bottom:50px}
.container{max-width:1000px;margin:0 auto;padding:10px}
.header-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;margin-bottom:20px}
@media(min-width:600px){.header-box{flex-direction:row;gap:30px;}}
.subtitle{font-size:0.7rem;color:#94a3b8;line-height:1.1;text-align:center;margin-top:5px}
.date-input-field{background:#0b1220; border:1px solid #334155; color:#fff; padding:2px 5px; border-radius:4px; font-family:system-ui; font-size:0.9rem; cursor:pointer; width:110px; text-align:center;}
.topbar{display:flex;justify-content:center;gap:20px;margin-bottom:15px;flex-wrap:wrap;}
.btn-group{display:flex;gap:4px;}
button{padding:8px 12px;border-radius:8px;border:0;cursor:pointer;background:#2563eb;color:#fff;font-size:14px;font-family:system-ui;}
button.reset{background:#dc2626}
button.back{background:#475569}
.modal{display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); padding:20px;}
.modal-content{background:#111827; margin:auto; padding:20px; max-width:500px; border-radius:12px; border:1px solid #243041; color:#e5e7eb; overflow-y:auto; max-height:90vh;}
textarea{width:100%; height:150px; background:#0b1220; color:#fff; border:1px solid #334155; padding:10px; margin-top:10px; border-radius:4px;font-family:system-ui;}
.groups{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:600px){.groups{grid-template-columns:1fr 1fr;}}
.card{background:#111827;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:15px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
th,td{padding:8px 4px;border-bottom:1px solid #1f2a3c;text-align:center;}
input{width:100%;padding:5px;border-radius:4px;background:#0b1220;border:1px solid #334155;color:#fff;text-align:center;font-family:system-ui;}
.db-cell{display:flex; gap:2px;}
.db-cell input{width:50%;}
.ko{margin-top:10px;display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:600px){.ko{grid-template-columns:1fr 1fr;}}
.koBox{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px;}
.match{padding:8px;margin-bottom:8px;border:1px solid #243041;border-radius:8px;text-align:center;font-size:13px;}
.finalContainer{border:2px solid #eab308;padding:15px;margin-top:20px;border-radius:15px;background:#1e293b;}
.winner-box{margin-top:10px;padding:15px;border-radius:8px;text-align:center;font-weight:bold;}
.top-win{background:rgba(251,191,36,.2);color:#fbbf24;font-size:1.3em;}
.qual-arrow-up{color:#22c55e;font-weight:bold;font-size:16px;display:inline-block;min-width:16px;}
.qual-arrow-down{color:#ef4444;font-weight:bold;font-size:16px;display:inline-block;min-width:16px;}
</style>
</head>
<body onload="initDefaults()">
<div class="container">
    <div class="header-box">
        <div style="text-align: center;">
            <img src="logo.jpg" alt="Logo" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb;">
            <div class="subtitle">Roberto Bove<br>Director & Event Organizer</div>
        </div>
        <div style="text-align: center;">
           <h1 style="margin:0;font-size:1.4rem;">🏆 Torneo 8 Squadre</h1>
         <input type="text" id="nomeTorneoInput" placeholder="Nome Torneo" onblur="state.nomeTorneo=this.value; updateAndSyncSilent();" class="date-input-field" style="width:200px; margin: 10px auto 0; display:block;">
<div style="display:flex; justify-content:center; gap:15px; margin-top:5px;">
    <div style="text-align:center;">
        <div style="font-size:0.7rem; color:#94a3b8; margin-bottom:2px;">Data prevista:</div>
        <input type="date" class="date-input-field" onchange="updateAndSyncSilent()">
    </div>
    <div style="text-align:center;">
        <div style="font-size:0.7rem; color:#94a3b8; margin-bottom:2px;">Start ore:</div>
        <input type="time" class="date-input-field" value="20:00" style="width:80px" onchange="updateAndSyncSilent()">
    </div>
</div>
</div> <!-- Chiude header-box -->
</div> <!-- Chiude container -->
<div class="topbar">
        <div class="btn-group">
            <button onclick="document.getElementById('file').click()">Import Excel</button>
            <input type="file" id="file" hidden onchange="handleFile(event)">
            <button onclick="document.getElementById('rulesModal').style.display='block'">📖 Regole</button>
            <button onclick="updateAndSyncSilent()">💾 Salva</button>
        </div>
        <div class="btn-group">
            <button onclick="document.getElementById('teamModal').style.display='block'">📝 Squadre</button>
        </div>
        <div class="btn-group">
            <button class="reset" onclick="reset()">Reset</button>
            <button onclick="window.print()">Stampa</button>
        </div>
    </div>

<div class="groups">
<div class="card">
    <table id="A"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Arows"></tbody></table>
    <table style="margin-top:20px;"><thead><tr><th>Girone A</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Aclass"></tbody></table>
</div>
<div class="card">
    <table id="B"><thead><tr><th>Campo</th><th>Ora</th><th>Match</th><th>Ris</th></tr></thead><tbody id="Brows"></tbody></table>
    <table style="margin-top:20px;"><thead><tr><th>Girone B</th><th>PT</th><th>GF</th><th>GS</th><th>DR</th></tr></thead><tbody id="Bclass"></tbody></table>
</div>
</div>

<div class="finalContainer">
    <h2 style="text-align:center;margin-top:0;">Fase Finale</h2>
    <div class="ko">
        <div class="koBox"><h3 style="text-align:center;">QUARTI</h3><div id="Q"></div></div>
        <div class="koBox"><h3 style="text-align:center;">SEMIFINALI</h3><div id="S"></div></div>
    </div>
    <div id="F" style="margin-top:20px;"></div>
</div>
</div>

<div id="teamModal" class="modal">
    <div class="modal-content">
        <h2>Gestione Squadre</h2>
        <div id="manualTeamInputs">
            <input type="text" placeholder="Squadra A1" onchange="state.A[0]=this.value">
            <input type="text" placeholder="Squadra A2" onchange="state.A[1]=this.value">
            <input type="text" placeholder="Squadra A3" onchange="state.A[2]=this.value">
            <input type="text" placeholder="Squadra A4" onchange="state.A[3]=this.value">
            <input type="text" placeholder="Squadra B1" onchange="state.B[0]=this.value">
            <input type="text" placeholder="Squadra B2" onchange="state.B[1]=this.value">
            <input type="text" placeholder="Squadra B3" onchange="state.B[2]=this.value">
            <input type="text" placeholder="Squadra B4" onchange="state.B[3]=this.value">
        </div>
        <button style="margin-top:10px; width:100%;" onclick="document.getElementById('teamModal').style.display='none'; render();">Salva e Chiudi</button>
    </div>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2>Regole del Torneo</h2>
        <p>Inserisci qui le tue regole...</p>
        <button onclick="document.getElementById('rulesModal').style.display='none'">Chiudi</button>
    </div>
</div>
<script>
const supabaseUrl = 'https://iybjvtmfaupgthqqsngd.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Ymp2dG1mYXVwZ3RocXFzbmdkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY2NzE4NSwiZXhwIjoyMDk4MjQzMTg1fQ.HNCXcSpzjfXxjsIhhEODJIkVkZwIcUmXBu1Cgxy7ID0';

const sb = supabase.createClient(supabaseUrl, supabaseKey);

let state = {
    nomeTorneo: "",
    A: [], B: [],
    matchesA: [[0,1],[2,3],[0,3],[1,2],[0,2],[1,3]],
    matchesB: [[0,1],[2,3],[0,3],[1,2],[0,2],[1,3]],
    Ares: Array(6).fill("-"),
    Bres: Array(6).fill("-"),
    Atime: Array(6).fill("-"),
    Btime: Array(6).fill("-"),
    Acamp: [2,3,2,3,2,3],
    Bcamp: [4,5,4,5,4,5],
    rankA: [],
    rankB: [],
    quarti: [],
    qRes: [],
    semiTop: [],
    sTopRes: [],
    finalTop: [],
    fTopRes: "",
    campioneTop: null
};

function initDefaults() {
    autofillTimes();
    render();
}

function autofillTimes(){
    for(let i=0;i<6;i++){
        let round = Math.floor(i/2); let totalMin = round*30;
        let hh = 20 + Math.floor(totalMin/60); let mm = totalMin % 60;
        let hhStr = String(hh).padStart(2,'0'); let mmStr = String(mm).padStart(2,'0');
        if(!state.Atime[i] || state.Atime[i]==="-") state.Atime[i] = hhStr+"-"+mmStr;
        if(!state.Btime[i] || state.Btime[i]==="-") state.Btime[i] = hhStr+"-"+mmStr;
    }
}
async function updateAndSyncSilent() {
    try {
        // 1. Salva lo stato attuale su Supabase
        await sb.from('torneo').upsert({ id: 'torneo_data', state: state });
    } catch (e) {
        console.error("Sync error:", e);
    }
    render();
}

async function loadData() {
    try {
        // 2. Scarica i dati salvati da Supabase all'avvio
        const { data, error } = await sb.from('torneo').select('state').eq('id', 'torneo_data').single();
        if (data && data.state) {
            state = data.state; // Sovrascrive lo stato locale con quello del DB
            render();
        }
    } catch (e) {
        console.error("Load error:", e);
    }
}
function handleFile(e){
    let r = new FileReader();
    r.onload = function(evt){
        let wb = XLSX.read(new Uint8Array(evt.target.result), {type:"array"});
        let data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1}).flat().filter(Boolean);
        state.A = data.slice(0,4); state.B = data.slice(4,8); updateAndSyncSilent();
    }; r.readAsArrayBuffer(e.target.files[0]);
}

function reset(){
    state.A=[]; state.B=[]; state.Ares=Array(6).fill("-"); state.Bres=Array(6).fill("-");
    state.qRes=Array(4).fill("-"); state.sTopRes=Array(2).fill("-"); state.fTopRes="-";
    autofillTimes(); updateAndSyncSilent();
}

function calc(teams,res,matches){
    let t = teams.map((n,idx)=>({ n, pt:0, gf:0, gs:0, df:0, id:idx, qual:false }));
    matches.forEach((m,i)=>{
        let r = res[i]; if(!r || r === "-" || !r.includes("-")) return;
        let parts = r.split("-"); let a = Number(parts[0]), b = Number(parts[1]);
        if(isNaN(a) || isNaN(b)) return;
        t[m[0]].gf += a; t[m[0]].gs += b; t[m[1]].gf += b; t[m[1]].gs += a;
        if(a>b) t[m[0]].pt += 3; else if(b>a) t[m[1]].pt += 3; else { t[m[0]].pt++; t[m[1]].pt++; }
    });
    t.forEach(x => x.df = x.gf - x.gs); t.sort((a,b)=> b.pt-a.pt || b.df-a.df || b.gf-a.gf || a.gs-b.gs); t.forEach((x,i)=>x.qual = i<2);
    return t;
}

function updateRes(g,i,pos,val){
    let r = (g==='A'?state.Ares:state.Bres); let parts = (r[i]||"-").split("-");
    parts[pos]=val; r[i]=parts.join("-"); updateAndSyncSilent();
}

function updateTime(g,i,pos,val){
    let t = (g==='A'?state.Atime:state.Btime); let parts = (t[i]||"-").split("-");
    parts[pos]=val; t[i]=parts.join("-"); updateAndSyncSilent();
}
function renderTables(){
    let A="", B="";
    [[state.A, state.Ares, state.Atime, 'A'], [state.B, state.Bres, state.Btime, 'B']].forEach((d,idx)=>{
        let list = d[0], res = d[1], time = d[2], tag = d[3];
        let matches = [[0,1],[2,3],[0,3],[1,2],[0,2],[1,3]];
        matches.forEach((m,i)=>{
            let t = (time[i]||"-").split("-"), r = (res[i]||"-").split("-");
            let row = `<tr><td>${tag==='A'?state.Acamp[i]:state.Bcamp[i]}</td><td><div class="db-cell"><input value="${t[0]||''}" oninput="updateTime('${tag}',${i},0,this.value)"><input value="${t[1]||''}" oninput="updateTime('${tag}',${i},1,this.value)"></div></td><td>${list[m[0]]||'-'}/${list[m[1]]||'-'}</td><td><div class="db-cell"><input value="${r[0]||''}" oninput="updateRes('${tag}',${i},0,this.value)"><input value="${r[1]||''}" oninput="updateRes('${tag}',${i},1,this.value)"></div></td></tr>`;
            if(tag==='A') A+=row; else B+=row;
        });
    });
    document.getElementById("Arows").innerHTML=A; document.getElementById("Brows").innerHTML=B;
}

function renderClass(){
    let newA = calc(state.A,state.Ares,state.matchesA), newB = calc(state.B,state.Bres,state.matchesB);
    document.getElementById("Aclass").innerHTML = newA.map(x=>`<tr><td><span class="${x.qual?'qual-arrow-up':'qual-arrow-down'}">${x.qual?'▲':'▼'}</span> ${x.n}</td><td>${x.pt}</td><td>${x.gf}</td><td>${x.gs}</td><td>${x.df}</td></tr>`).join("");
    document.getElementById("Bclass").innerHTML = newB.map(x=>`<tr><td><span class="${x.qual?'qual-arrow-up':'qual-arrow-down'}">${x.qual?'▲':'▼'}</span> ${x.n}</td><td>${x.pt}</td><td>${x.gf}</td><td>${x.gs}</td><td>${x.df}</td></tr>`).join("");
}

function renderKO(){
    if(!state.A.length || !state.B.length) return;
    let rA = calc(state.A,state.Ares,state.matchesA), rB = calc(state.B,state.Bres,state.matchesB);
    if(rA.length<4 || rB.length<4) { document.getElementById('Q').innerHTML = '<p>Completa gironi</p>'; return; }
    let quarti = [{c:2, h:rA[0].n, a:rB[3].n}, {c:3, h:rB[1].n, a:rA[2].n}, {c:4, h:rB[0].n, a:rA[3].n}, {c:5, h:rA[1].n, a:rB[2].n}];
    document.getElementById('Q').innerHTML = quarti.map((q,i)=>matchBox(q.c, q.h, q.a, state.qRes[i], 'updateQRes', i)).join('');
    let qRes = quarti.map((q,i)=> resolveMatch(q.h, q.a, state.qRes[i]));
    let semi = [{c:2, h:qRes[0].winner, a:qRes[1].winner}, {c:3, h:qRes[2].winner, a:qRes[3].winner}];
    document.getElementById('S').innerHTML = semi.map((m,i)=>matchBox(m.c, m.h, m.a, state.sTopRes[i], 'updateSTopRes', i)).join('');
    let sRes = semi.map((m,i)=>resolveMatch(m.h, m.a, state.sTopRes[i]));
    state.campioneTop = resolveMatch(sRes[0].winner, sRes[1].winner, state.fTopRes).winner;
    document.getElementById('F').innerHTML = `<h3 style="text-align:center;">🏆 FINALE</h3>` + matchBox('F', sRes[0].winner, sRes[1].winner, state.fTopRes, 'updateFinalRes', 0) + (state.campioneTop ? `<div class="winner-box top-win">CAMPIONE: ${state.campioneTop}</div>` : '');
}

function matchBox(campo, home, away, resStr, updateFn, idx){
    let parts = (resStr||"-").split("-");
    return `<div class="match"><div>CAMPO ${campo}: ${home||'--'} vs ${away||'--'}</div><div class="db-cell"><input value="${parts[0]||''}" oninput="${updateFn}(${idx},0,this.value)"><input value="${parts[1]||''}" oninput="${updateFn}(${idx},1,this.value)"></div></div>`;
}

function resolveMatch(home, away, resStr){
    if(!home || !away || !resStr || resStr==="-" || !resStr.includes("-")) return {winner:null};
    let parts = resStr.split("-"), a = Number(parts[0]), b = Number(parts[1]);
    return (a>b) ? {winner:home} : {winner:away};
}

function updateQRes(i,pos,val){ let p=(state.qRes[i]||'-').split('-'); p[pos]=val; state.qRes[i]=p.join('-'); updateAndSyncSilent(); }
function updateSTopRes(i,pos,val){ let p=(state.sTopRes[i]||'-').split('-'); p[pos]=val; state.sTopRes[i]=p.join('-'); updateAndSyncSilent(); }
function updateFinalRes(i,pos,val){ let p=(state.fTopRes||'-').split('-'); p[pos]=val; state.fTopRes=p.join('-'); updateAndSyncSilent(); }
function render(){ renderTables(); renderClass(); renderKO(); }
</script>
</body>
</html>
